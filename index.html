<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>📡 RTRS Clicker</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Orbitron:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
--white:#FDFDFD;--red:#EA212E;--lblue:#77C7E6;
--dblue:#104586;--mblue:#3388BB;--yellow:#FBBF24;
--bg:#060d18;--bg2:#0a1628;--bg3:#0d1f3a;--bg4:#102240;--bg5:#162d52;
--border:#1a3555;--radius:20px;--radius-sm:16px;--shadow:0 8px 32px rgba(0,0,0,.4)
}
body.light{
--bg:#F5F7FA;--bg2:#FFFFFF;--bg3:#E8EDF5;--bg4:#F0F4F8;--bg5:#E8EEF5;
--border:#D1D9E6;--text:#1A202C;--white:#1A202C;--mblue:#2D5A8C;
--shadow:0 8px 32px rgba(0,0,0,.08)
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--white);overflow-x:hidden;min-height:100vh;touch-action:manipulation;-webkit-tap-highlight-color:transparent;transition:background .4s ease,color .4s ease}

.header{background:linear-gradient(135deg,var(--dblue) 0%,var(--bg) 100%);
border-bottom:1px solid rgba(119,199,230,.3);padding:14px 16px;
display:flex;align-items:center;justify-content:space-between;
position:sticky;top:0;z-index:100;border-radius:0 0 var(--radius) 0;
box-shadow:var(--shadow)}
body.light .header{background:linear-gradient(135deg,var(--mblue) 0%,var(--bg2) 100%);
border-bottom:1px solid rgba(119,199,230,.4)}
.header-title{font-family:'Orbitron',sans-serif;font-size:1.2rem;font-weight:900;
background:linear-gradient(135deg,var(--lblue),var(--white));
-webkit-background-clip:text;-webkit-text-fill-color:transparent;
letter-spacing:.5px}
.header-stats{display:flex;gap:16px;align-items:center}
.h-stat{text-align:center;padding:6px 12px;background:rgba(255,255,255,.05);
border-radius:12px;min-width:70px}
body.light .h-stat{background:rgba(0,0,0,.03)}
.h-label{font-size:.55rem;color:var(--mblue);text-transform:uppercase;letter-spacing:1px;margin-bottom:2px;font-weight:600}
.h-val{font-family:'Orbitron',sans-serif;font-size:.95rem;color:var(--white);font-weight:700}
body.light .h-val{color:var(--text)}
.h-val.blue{color:var(--lblue)}
.h-val.red{color:var(--red)}

.game{display:grid;grid-template-columns:1fr 1fr;min-height:calc(100vh - 70px)}
.click-panel{display:flex;flex-direction:column;align-items:center;justify-content:center;
padding:30px 20px;position:relative;overflow:hidden;
background:radial-gradient(ellipse at top,var(--bg3) 0%,var(--bg) 60%);
border-radius:0 0 var(--radius) 0}
.click-panel::before{content:'';position:absolute;inset:0;
background:radial-gradient(2px 2px at 15% 25%,rgba(234,33,46,.25),transparent),
radial-gradient(2px 2px at 85% 15%,rgba(119,199,230,.25),transparent),
radial-gradient(2px 2px at 50% 80%,rgba(119,199,230,.15),transparent),
radial-gradient(2px 2px at 75% 65%,rgba(234,33,46,.15),transparent);
animation:twinkle 4s ease-in-out infinite alternate;pointer-events:none}
@keyframes twinkle{0%{opacity:.4}100%{opacity:1}}

.sig-display{text-align:center;margin-bottom:25px;z-index:1;position:relative}
.sig-count{font-family:'Orbitron',sans-serif;font-size:2.6rem;font-weight:900;
color:var(--white);line-height:1.1;text-shadow:0 0 30px rgba(119,199,230,.4);transition:transform .1s ease}
.sig-count.pop{transform:scale(1.08)}
.sig-label{font-size:.9rem;color:var(--lblue);margin-top:4px;font-weight:400;letter-spacing:.5px}
.sps-txt{font-family:'Orbitron',sans-serif;font-size:.8rem;color:var(--mblue);margin-top:6px}

.tower-area{position:relative;z-index:1;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent;width:240px;height:320px}
.tower-overlay{position:absolute;inset:0;z-index:2;border-radius:var(--radius)}
.tower-svg{transition:transform .15s cubic-bezier(.34,1.56,.64,1);transform-origin:bottom center;width:100%;height:100%;filter:drop-shadow(0 10px 30px rgba(0,0,0,.3))}
.tower-area:active .tower-svg{transform:scale(.94) translateY(3px)}

.stage-badge{margin-top:20px;z-index:1;font-size:.65rem;color:var(--lblue);
font-family:'Orbitron',sans-serif;text-transform:uppercase;letter-spacing:2px;
padding:8px 20px;border:1px solid var(--mblue);border-radius:20px;
background:rgba(16,69,134,.4);text-align:center;box-shadow:var(--shadow)}
.click-info{margin-top:16px;z-index:1;font-size:.8rem;color:var(--mblue);font-weight:500}
.click-info span{color:var(--lblue);font-family:'Orbitron',sans-serif;font-weight:700}

.ch-bar{z-index:1;margin-bottom:10px;min-height:0}
.ch-tag{display:inline-block;margin:2px;padding:5px 12px;background:rgba(234,33,46,.2);
border:1px solid rgba(234,33,46,.5);border-radius:14px;font-size:.6rem;
font-weight:600;color:var(--red);box-shadow:0 2px 10px rgba(234,33,46,.2)}

.fnum{position:absolute;font-family:'Orbitron',sans-serif;font-weight:700;
color:var(--red);pointer-events:none;white-space:nowrap;
text-shadow:0 0 15px rgba(234,33,46,.9),0 2px 6px rgba(0,0,0,.8);
animation:fUp .9s cubic-bezier(.2,.8,.2,1) forwards;z-index:50;font-size:1.2rem}
@keyframes fUp{0%{transform:translateY(0) scale(.5);opacity:0}
20%{transform:translateY(-10px) scale(1.3);opacity:1}
80%{transform:translateY(-60px) scale(1);opacity:.9}
100%{transform:translateY(-80px) scale(.8);opacity:0}}
.shock{position:absolute;border-radius:50%;pointer-events:none;
border:2px solid rgba(234,33,46,.6);animation:sEx .5s cubic-bezier(.1,.8,.2,1) forwards;z-index:50}
@keyframes sEx{0%{width:10px;height:10px;opacity:.9;transform:translate(-50%,-50%)}
100%{width:160px;height:160px;opacity:0;transform:translate(-50%,-50%)}}
.burst{position:absolute;width:6px;height:6px;border-radius:50%;pointer-events:none;
box-shadow:0 0 8px currentColor;animation:bFl .6s cubic-bezier(.15,.8,.3,1) forwards;z-index:50}
@keyframes bFl{0%{transform:translate(0,0) scale(1.3);opacity:1}
100%{transform:translate(var(--tx),var(--ty)) scale(0);opacity:0}}
.glow{position:absolute;border-radius:50%;pointer-events:none;
background:radial-gradient(circle,rgba(234,33,46,.4) 0%,transparent 70%);
animation:gF .3s ease-out forwards;z-index:50}
@keyframes gF{0%{width:25px;height:25px;opacity:.9;transform:translate(-50%,-50%)}
100%{width:100px;height:100px;opacity:0;transform:translate(-50%,-50%)}}

.shop{background:var(--bg2);border-left:1px solid rgba(119,199,230,.3);overflow-y:auto;
max-height:calc(100vh - 70px);scrollbar-width:thin;scrollbar-color:var(--border) transparent;
border-radius:0 0 0 var(--radius)}
body.light .shop{border-left:1px solid rgba(119,199,230,.4);background:var(--bg2)}
.shop-tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;padding:12px;
position:sticky;top:0;background:var(--bg2);z-index:10;border-bottom:1px solid var(--border)}
body.light .shop-tabs{background:var(--bg2)}
.stab{display:flex;flex-direction:column;align-items:center;justify-content:center;
padding:10px 4px;cursor:pointer;font-family:'Inter',sans-serif;font-size:.6rem;
font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--mblue);
border:none;transition:all .2s;background:none;border-radius:12px;gap:4px}
.stab:hover{background:rgba(119,199,230,.1);transform:translateY(-2px)}
.stab.active{background:linear-gradient(135deg,rgba(119,199,230,.2),rgba(119,199,230,.1));
color:var(--lblue);box-shadow:0 4px 12px rgba(119,199,230,.15)}
.stab-emoji{font-size:1.6rem;line-height:1}
.stab-text{font-size:.55rem;font-weight:700}
.tcont{display:none;padding:16px}
.tcont.active{display:block}
.brow{display:flex;gap:8px;margin-bottom:12px;justify-content:center;flex-wrap:wrap}
.bbtn{font-family:'Inter',sans-serif;font-size:.7rem;padding:7px 14px;
border:1px solid var(--border);background:var(--bg4);color:var(--mblue);
border-radius:10px;cursor:pointer;transition:all .2s;font-weight:600}
body.light .bbtn{background:var(--bg4);color:var(--mblue)}
.bbtn.active{border-color:var(--lblue);color:var(--lblue);background:rgba(119,199,230,.15);box-shadow:0 0 0 2px rgba(119,199,230,.3)}

.card{background:var(--bg4);border:1px solid var(--border);border-radius:var(--radius-sm);
padding:14px;margin-bottom:10px;display:flex;align-items:center;gap:12px;
cursor:pointer;transition:all .2s;position:relative;overflow:hidden;
box-shadow:0 2px 12px rgba(0,0,0,.15)}
body.light .card{box-shadow:0 2px 12px rgba(0,0,0,.06);background:var(--bg4)}
.card:hover{background:var(--bg5);border-color:var(--mblue);transform:translateX(4px);
box-shadow:0 4px 20px rgba(119,199,230,.15)}
.card.aff{border-color:rgba(119,199,230,.5)}
.card.aff:hover{border-color:var(--lblue);box-shadow:0 0 0 2px rgba(119,199,230,.25)}
.card.lock{opacity:.35;pointer-events:none}
.cicon{width:44px;height:44px;background:linear-gradient(135deg,var(--dblue),var(--bg));
border-radius:12px;display:flex;align-items:center;justify-content:center;
font-size:1.4rem;flex-shrink:0;border:1px solid var(--border);
box-shadow:0 4px 12px rgba(0,0,0,.2)}
body.light .cicon{background:linear-gradient(135deg,var(--mblue),var(--bg3));
box-shadow:0 4px 12px rgba(0,0,0,.08)}
.cinfo{flex:1;min-width:0}
.cname{font-family:'Inter',sans-serif;font-size:.75rem;font-weight:700;color:var(--white);margin-bottom:3px}
body.light .cname{color:var(--text)}
.cdesc{font-size:.62rem;color:var(--mblue);margin-bottom:4px;line-height:1.3}
.csub{font-size:.62rem;color:var(--lblue);font-weight:600}
.cright{text-align:right;flex-shrink:0}
.ccost{font-family:'Orbitron',sans-serif;font-size:.75rem;font-weight:700;color:var(--white)}
body.light .ccost{color:var(--text)}
.ccost.no{color:var(--red)}
.ccost.partial{color:var(--yellow)}
.ccount{font-size:.6rem;color:var(--mblue);margin-top:3px;font-weight:500}

.ucard.aff{border-color:rgba(234,33,46,.5)}
.ucard.aff:hover{border-color:var(--red);box-shadow:0 0 0 2px rgba(234,33,46,.2)}
.ucard.done{opacity:.4;pointer-events:none;border-color:var(--lblue)}
.ucost{font-family:'Orbitron',sans-serif;font-size:.75rem;font-weight:700;color:var(--white)}
body.light .ucost{color:var(--text)}
.ucost.no{color:var(--red)}
.ucost.partial{color:var(--yellow)}

.achcard.unl{border-color:rgba(234,33,46,.5);background:rgba(234,33,46,.06)}
.achcard.lock{opacity:.3}
.achicon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;
justify-content:center;font-size:1.2rem;flex-shrink:0;
background:linear-gradient(135deg,#1a0a10,#0a0508);border:1px solid var(--border);
box-shadow:0 4px 12px rgba(0,0,0,.2)}
body.light .achicon{background:linear-gradient(135deg,#2a1015,#1a0810)}
.achcard.unl .achicon{background:linear-gradient(135deg,#2a1015,#1a0810);
border-color:rgba(234,33,46,.5);box-shadow:0 0 0 2px rgba(234,33,46,.25)}
.achname{font-family:'Inter',sans-serif;font-size:.65rem;font-weight:700;color:var(--red);margin-bottom:2px}
.achdesc{font-size:.6rem;color:var(--mblue)}

.seclbl{font-family:'Inter',sans-serif;font-size:.6rem;color:var(--mblue);
text-transform:uppercase;letter-spacing:1.5px;margin-bottom:10px;padding-bottom:6px;
border-bottom:1px solid var(--border);font-weight:700}

.pbar{height:10px;background:var(--border);border-radius:5px;overflow:hidden;margin-top:10px}
.pfill{height:100%;background:linear-gradient(90deg,var(--red),#FF6B6B);border-radius:5px;transition:width .4s ease}
.pfill.done{background:linear-gradient(90deg,var(--lblue),#4ECDC4)}
.ptxt{font-size:.6rem;color:var(--mblue);margin-top:6px;font-family:'Inter',sans-serif;font-weight:600}

.psec{text-align:center;padding:22px 16px;margin-bottom:16px;
background:var(--bg4);border:1px solid var(--border);border-radius:var(--radius-sm);
box-shadow:var(--shadow)}
body.light .psec{background:var(--bg4)}
.psec h3{font-family:'Orbitron',sans-serif;font-size:1rem;margin-bottom:10px;color:var(--white)}
body.light .psec h3{color:var(--text)}
.psec .rd{color:var(--red)}
.psec .bl{color:var(--lblue)}
.psec p{font-size:.72rem;color:var(--mblue);margin-bottom:14px;line-height:1.5}
.pgain{font-family:'Orbitron',sans-serif;font-size:1.4rem;font-weight:900;margin:12px 0;color:var(--white)}
body.light .pgain{color:var(--text)}
.pbtn{font-family:'Inter',sans-serif;font-size:.75rem;font-weight:700;padding:12px 28px;
border:2px solid;border-radius:14px;cursor:pointer;transition:all .3s;
text-transform:uppercase;letter-spacing:1px;margin:8px 0;background:transparent;
box-shadow:0 4px 15px rgba(0,0,0,.2);font-weight:600}
.pbtn.red{border-color:var(--red);color:var(--red)}
.pbtn.red:hover{background:rgba(234,33,46,.15);box-shadow:0 0 0 3px rgba(234,33,46,.3),0 8px 25px rgba(234,33,46,.25);transform:translateY(-2px)}
.pbtn.blue{border-color:var(--lblue);color:var(--lblue)}
.pbtn.blue:hover{background:rgba(119,199,230,.15);box-shadow:0 0 0 3px rgba(119,199,230,.3),0 8px 25px rgba(119,199,230,.2);transform:translateY(-2px)}
.pbtn:disabled{opacity:.25;cursor:not-allowed;transform:none!important;box-shadow:none!important}

.chcard{background:var(--bg4);border:1px solid var(--border);border-radius:var(--radius-sm);
padding:14px;margin-bottom:10px;cursor:pointer;transition:all .2s;
box-shadow:0 2px 12px rgba(0,0,0,.15)}
body.light .chcard{box-shadow:0 2px 12px rgba(0,0,0,.06);background:var(--bg4)}
.chcard:hover{border-color:var(--mblue);transform:translateX(4px);box-shadow:0 4px 20px rgba(119,199,230,.15)}
body.light .chcard:hover{background:var(--bg5)}
.chcard.active{border-color:var(--red);background:rgba(234,33,46,.1);box-shadow:0 0 0 2px rgba(234,33,46,.25)}
body.light .chcard.active{background:rgba(234,33,46,.08)}
.chcard.done{border-color:var(--lblue);opacity:.5;pointer-events:none}
.chnm{font-family:'Inter',sans-serif;font-size:.75rem;font-weight:700;color:var(--white);margin-bottom:5px}
body.light .chnm{color:var(--text)}
.chdesc{font-size:.65rem;color:var(--mblue);margin-bottom:5px;line-height:1.4}
.chreward{font-size:.62rem;color:var(--lblue);font-weight:600}

.autorow{display:flex;align-items:center;justify-content:space-between;padding:14px;margin-bottom:10px;
background:var(--bg4);border:1px solid var(--border);border-radius:var(--radius-sm);
box-shadow:0 2px 10px rgba(0,0,0,.1)}
body.light .autorow{box-shadow:0 2px 10px rgba(0,0,0,.05);background:var(--bg4)}
.autolbl{font-family:'Inter',sans-serif;font-size:.7rem;color:var(--white);font-weight:600}
body.light .autolbl{color:var(--text)}
.autodsc{font-size:.62rem;color:var(--mblue);margin-top:3px}
.tgl{width:50px;height:26px;border-radius:13px;background:var(--border);cursor:pointer;
position:relative;transition:background .2s;flex-shrink:0}
.tgl.on{background:var(--lblue)}
.tgl::after{content:'';position:absolute;width:22px;height:22px;border-radius:50%;
background:var(--white);top:2px;left:2px;transition:transform .2s;box-shadow:0 2px 8px rgba(0,0,0,.25)}
.tgl.on::after{transform:translateX(24px)}

.srow{display:flex;justify-content:space-between;padding:10px 0;
border-bottom:1px solid rgba(255,255,255,.06);font-size:.75rem}
body.light .srow{border-bottom:1px solid rgba(0,0,0,.06)}
.slbl{color:var(--mblue);font-weight:500}
.sval{font-family:'Orbitron',sans-serif;font-size:.68rem;color:var(--lblue);font-weight:700}

.golden{position:absolute;font-size:1.8rem;cursor:pointer;z-index:200;
animation:gFl 6s ease-in-out forwards;filter:drop-shadow(0 0 15px rgba(234,33,46,.7));transition:transform .15s}
.golden:hover{transform:scale(1.3)}
@keyframes gFl{0%{opacity:0;transform:scale(.4)}10%{opacity:1;transform:scale(1)}
90%{opacity:1}100%{opacity:0;transform:scale(.4)}}

.notif{position:fixed;top:75px;right:18px;background:var(--bg4);border:2px solid var(--lblue);
border-radius:var(--radius-sm);padding:14px 20px;z-index:1000;max-width:320px;
box-shadow:0 10px 40px rgba(0,0,0,.4);animation:nIn .4s ease-out,nOut .5s ease-in 2.5s forwards}
body.light .notif{background:var(--bg4);box-shadow:0 10px 40px rgba(0,0,0,.15)}
.ntitle{font-family:'Orbitron',sans-serif;font-size:.72rem;color:var(--lblue);margin-bottom:4px;font-weight:700}
.ntext{font-size:.68rem;color:var(--mblue);line-height:1.4}

.theme-toggle{position:fixed;top:75px;left:18px;z-index:1000;
background:var(--bg4);border:2px solid var(--mblue);border-radius:50%;
width:48px;height:48px;cursor:pointer;display:flex;align-items:center;justify-content:center;
font-size:1.4rem;box-shadow:var(--shadow);transition:all .3s}
body.light .theme-toggle{background:var(--bg4)}
.theme-toggle:hover{transform:scale(1.15) rotate(15deg);box-shadow:0 0 0 3px rgba(119,199,230,.3)}

@media(max-width:900px){
.game{grid-template-columns:1fr;grid-template-rows:auto 1fr}
.click-panel{min-height:42vh;padding:25px 16px;border-radius:0}
.shop{max-height:none;border-left:none;border-top:1px solid var(--border);border-radius:0}
body.light .shop{border-top:1px solid var(--mblue)}
.sig-count{font-size:1.8rem}
.header{padding:12px 14px;flex-wrap:wrap;gap:8px;border-radius:0}
.header-title{font-size:1.05rem;width:100%;text-align:center}
.header-stats{width:100%;justify-content:center;gap:8px}
.h-stat{min-width:60px;padding:5px 10px}
.h-val{font-size:.85rem}
.tower-area{width:200px;height:270px}
.shop-tabs{grid-template-columns:repeat(4,1fr);gap:2px;padding:8px}
.stab-emoji{font-size:1.3rem}
.stab-text{font-size:.5rem}
.theme-toggle{top:70px;left:14px;width:44px;height:44px;font-size:1.2rem}
}
@media(max-width:480px){
.click-panel{min-height:38vh;padding:18px 12px}
.sig-count{font-size:1.5rem}
.tower-area{width:170px;height:230px}
.header-title{font-size:.95rem}
.h-val{font-size:.75rem}
.h-label{font-size:.5rem}
.shop-tabs{gap:1px}
.stab{padding:8px 2px}
.stab-emoji{font-size:1.2rem}
.stab-text{font-size:.45rem}
.card{padding:12px;gap:10px}
.cicon{width:40px;height:40px;font-size:1.2rem}
.cname{font-size:.7rem}
.cdesc,.csub{font-size:.58rem}
.ccost,.ucost{font-size:.68rem}
.achname{font-size:.62rem}
.psec{padding:16px 12px}
.pbtn{padding:10px 20px;font-size:.68rem}
.pgain{font-size:1.1rem}
.srow{font-size:.68rem;padding:8px 0}
.sval{font-size:.6rem}
.autorow{padding:12px}
.autolbl{font-size:.68rem}
.bbtn{padding:6px 12px;font-size:.65rem}
}
</style>
</head>
<body>

<div class="header">
<div class="header-title">📡 RTRS CLICKER</div>
<div class="header-stats">
<div class="h-stat"><div class="h-label">Сигналы</div><div class="h-val" id="hSig">0</div></div>
<div class="h-stat"><div class="h-label">В сек</div><div class="h-val blue" id="hSps">0</div></div>
<div class="h-stat" id="fBox" style="display:none"><div class="h-label">Частота</div><div class="h-val red" id="hFreq">0</div></div>
<div class="h-stat" id="haBox" style="display:none"><div class="h-label">Гармоники</div><div class="h-val blue" id="hHarm">0</div></div>
</div>
</div>

<button class="theme-toggle" onclick="toggleTheme()" title="Сменить тему">🌓</button>

<div class="game">
<div class="click-panel" id="panel">
<div class="sig-display">
<div class="sig-count" id="sCount">0</div>
<div class="sig-label">📡 сигналов</div>
<div class="sps-txt" id="spsTxt">0 сигналов/сек</div>
</div>
<div class="ch-bar" id="chBar"></div>
<div class="tower-area" id="towerArea">
<div class="tower-overlay" id="clickOverlay"></div>
<div id="towerSVG"></div>
</div>
<div class="stage-badge" id="stageBadge">Стадия: Антенна</div>
<div class="click-info">Клик: <span id="cpVal">1</span> сигнал</div>
</div>

function cMod(){
let m={spsM:1,clkM:1,prodM:1,costM:1,freqM:1,durM:1};
for(let c of CH)if(G.chStart[c.id]){
if(c.mod.spsM!==undefined)m.spsM*=c.mod.spsM;
if(c.mod.clkM!==undefined)m.clkM*=c.mod.clkM;
if(c.mod.prodM!==undefined)m.prodM*=c.mod.prodM;
if(c.mod.costM!==undefined)m.costM*=c.mod.costM;
if(c.mod.freqM!==undefined)m.freqM*=c.mod.freqM;
if(c.mod.durM!==undefined)m.durM*=c.mod.durM;
}return m;
}

function bMult(id){
let m=1;
for(let u of UPG)if(G.upg[u.id]&&u.tp==='bld'&&u.b===id)m*=u.m;
for(let u of UPG)if(G.upg[u.id]&&u.tp==='glb')m*=u.m;
m*=(1+G.freq*.05)*(1+G.harm*.1);
m*=cMod().prodM;
return m;
}
function bSps(id){let b=BLD.find(x=>x.id===id);return b?b.sps*bMult(id)*bc(id):0}
function tSps(){return BLD.reduce((s,b)=>s+bSps(b.id),0)*cMod().spsM}
function cPow(){
let p=1;
for(let u of UPG)if(G.upg[u.id]&&u.tp==='clk')p*=u.m;
p*=cMod().clkM;
p*=(1+G.freq*.05)*(1+G.harm*.1);
if(G.chDone.pc1)p*=1.05;
if(G.chDone.pc5)p*=1.2;
return p;
}
function pGain(){return G.totAll<1e6?0:Math.floor(Math.pow(G.totAll/1e6,.5))}
function hGain(){return G.freq<1e3?0:Math.floor(Math.pow(G.freq/1e3,.5))}

function fmt(n){
if(n==null||isNaN(n))return'0';if(n<0)n=0;
if(n<1)return n.toFixed(1);
if(n<1e4)return Math.floor(n).toLocaleString('ru');
if(n<1e6)return(n/1e3).toFixed(1)+'K';
if(n<1e9)return(n/1e6).toFixed(2)+'M';
if(n<1e12)return(n/1e9).toFixed(2)+'B';
if(n<1e15)return(n/1e12).toFixed(2)+'T';
return n.toExponential(2);
}
function fmtT(ms){
let s=Math.floor(ms/1e3),m=Math.floor(s/60);s%=60;
let h=Math.floor(m/60);m%=60;let d=Math.floor(h/24);h%=24;
if(d>0)return d+'д '+h+'ч';if(h>0)return h+'ч '+m+'м';if(m>0)return m+'м '+s+'с';return s+'с';
}

function openTab(t){
document.querySelectorAll('.stab').forEach(e=>e.classList.remove('active'));
document.querySelectorAll('.tcont').forEach(e=>e.classList.remove('active'));
event.currentTarget.classList.add('active');
document.getElementById('t'+t).classList.add('active');
}
function rBuyRow(){
let h='';
for(let x of[1,10,100])h+='<button class="bbtn'+(G.buy===x?' active':'')+'" onclick="setBuy('+x+')">x'+x+'</button>';
document.getElementById('buyRow').innerHTML=h;
}
function setBuy(n){G.buy=n;rBuyRow();rBld()}

function rBld(){
let c=document.getElementById('bList'),h='';
let cm=cMod();
for(let b of BLD){
let cnt=bc(b.id);
let maxAffordable=bBA(b,cnt);
let cost=bBC(b,cnt,G.buy);
let aff=G.sig>=cost;
let amt=maxAffordable;
if(amt>0)cost=bBC(b,cnt,amt);
let dc=Math.ceil(cost*(cm.costM||1));
let sps=b.sps*bMult(b.id),tot=bSps(b.id);
let locked=cnt===0&&G.tot<b.cost*.4;

let costClass='ccost';
if(!aff){
if(maxAffordable>0)costClass='ccost partial';
else costClass='ccost no';
}

h+='<div class="card'+(aff?' aff':'')+(locked?' lock':'')+'" onclick="buyB(\''+b.id+'\')">';
h+='<div class="cicon">'+b.ic+'</div><div class="cinfo">';
h+='<div class="cname">'+b.name+'</div><div class="cdesc">'+b.desc+'</div>';
h+='<div class="csub">+'+fmt(sps)+'/с | '+fmt(tot)+'</div></div>';
h+='<div class="cright"><div class="'+costClass+'">'+fmt(dc)+'</div>';
h+='<div class="ccount">'+cnt+(amt>1&&G.buy>1?' (×'+amt+')':'')+'</div></div></div>';
}
c.innerHTML=h;
}

function rUpg(){
let c=document.getElementById('uList'),h='',av=0;
for(let u of UPG){
if(G.upg[u.id]){h+='<div class="card ucard done"><div class="cicon">'+u.ic+'</div><div class="cinfo"><div class="cname">'+u.nm+' ✓</div><div class="cdesc">'+u.desc+'</div></div></div>';continue}
if(!u.req())continue;av++;

let costClass='ucost';
if(G.sig<u.cost)costClass='ucost no';

h+='<div class="card ucard'+(G.sig>=u.cost?' aff':'')+'" onclick="buyU(\''+u.id+'\')">';
h+='<div class="cicon">'+u.ic+'</div><div class="cinfo"><div class="cname">'+u.nm+'</div><div class="cdesc">'+u.desc+'</div><div class="'+costClass+'">'+fmt(u.cost)+'</div></div></div>';
}
if(!av)h='<div style="text-align:center;color:var(--mblue);padding:30px;font-size:.75rem">Нет улучшений</div>';
c.innerHTML=h;
}

function rAch(){
let c=document.getElementById('aList'),un=0;
let h='<div class="seclbl">Разблокировано: 0/'+ACH.length+'</div>';

h=h.replace('0/',un+'/');c.innerHTML=h;
}

let fg=pGain(),hg=hGain();
h+='<div class="psec"><h3>🔴 <span class="rd">Резонанс Частоты</span></h3>';

function rChal(){
let c=document.getElementById('cList'),h='<div class="seclbl">Активные</div>';
let has=false;
let now=Date.now();
let cm=cMod();
for(let ch of CH){
let ts=G.chStart[ch.id];
if(ts!==undefined){
has=true;
let baseDur=ch.dur*(cm.durM||1);
let elapsed=(now-ts)/1000;
let pct=Math.min((elapsed/baseDur)*100,100);
let done=pct>=100;
let timeLeft=Math.max(baseDur-elapsed,0);
h+='<div class="chcard active">';
h+='<div class="chnm">🔥 '+ch.nm+'</div>';
h+='<div class="chdesc">'+ch.desc+'</div>';
h+='<div class="pbar"><div class="pfill'+(done?' done':'')+'" style="width:'+pct+'%"></div></div>';
h+='<div class="ptxt">'+(done?'✓ Завершается...':Math.ceil(timeLeft)+'с осталось')+' ('+Math.floor(pct)+'%)</div>';
h+='</div>';
}
}
if(!has)h+='<div style="text-align:center;color:var(--mblue);padding:8px;font-size:.65rem">Нет активных челленджей</div>';

h+='<div class="seclbl" style="margin-top:12px">Доступные челленджи</div>';
for(let ch of CH){
let active=G.chStart[ch.id]!==undefined;
let done=G.chDone[ch.rw];
let can=!active&&!done&&ch.req();
h+='<div class="chcard'+(done?' done':'')+
'"'+(can?' onclick="startCh(\''+ch.id+'\')"':'')+'> ';
h+='<div class="chnm">'+ch.nm+(active?' 🔥':'')+(done?' ✓':'')+'</div>';
h+='<div class="chdesc">'+ch.desc+'</div>';
h+='<div style="font-size:.58rem;color:var(--mblue);margin:5px 0"><span style="color:var(--red);font-weight:700">'+ch.diff+'</span> | '+ch.dur+'с</div>';
if(done)h+='<div class="chreward">🎁 '+ch.rwD+' (получено)</div>';
else h+='<div class="chreward">Награда: '+ch.rwD+'</div>';
if(!done&&!active)h+='<div style="font-size:.55rem;color:var(--mblue);margin-top:3px">Требование: '+fmt(ch.req.val||0)+' сигналов</div>';
h+='</div>';
}
c.innerHTML=h;
}

'<div class="srow"><span class="slbl">В секунду</span><span class="sval">'+fmt(G.sps)+'</span></div>'+
'<div class="srow"><span class="slbl">Клик</span><span class="sval">'+fmt(cPow())+'</span></div>'+
'<div class="srow"><span class="slbl">Клики</span><span class="sval">'+G.clicks.toLocaleString('ru')+'</span></div>'+
'<div class="srow"><span class="slbl">Здания</span><span class="sval">'+tB()+'</span></div>'+
'<div class="srow"><span class="slbl">Частота</span><span class="sval">'+G.freq+' (+'+G.freq*5+'%)</span></div>'+
'<div class="srow"><span class="slbl">Гармоники</span><span class="sval">'+G.harm+' (+'+G.harm*10+'%)</span></div>'+
'<div class="srow"><span class="slbl">Улучшения</span><span class="sval">'+Object.keys(G.upg).length+'/'+UPG.length+'</span></div>'+
'<div class="srow"><span class="slbl">Достижения</span><span class="sval">'+Object.keys(G.ach).length+'/'+ACH.length+'</span></div>'+
'<div class="srow"><span class="slbl">Челленджи</span><span class="sval">'+Object.keys(G.chDone).length+'/'+CH.length+'</span></div>'+
'<div class="srow"><span class="slbl">Время</span><span class="sval">'+fmtT(Date.now()-G.start)+'</span></div>';
}

function render(){
let tab=document.querySelector('.stab.active');if(!tab)return;
let t=tab.textContent.trim();
if(t.includes('Здания'))rBld();
else if(t.includes('Улучшения'))rUpg();
else if(t.includes('Челлендж'))rChal();
else if(t.includes('Достижения'))rAch();
else if(t.includes('Престиж'))rPre();
else if(t.includes('Авто'))rAuto();
else if(t.includes('Статы'))rStats();
}

function upd(){
document.getElementById('sCount').textContent=fmt(G.sig);
document.getElementById('hSig').textContent=fmt(G.sig);
document.getElementById('hSps').textContent=fmt(G.sps);
document.getElementById('spsTxt').textContent=fmt(G.sps)+' с/сек';
document.getElementById('cpVal').textContent=fmt(cPow());
document.getElementById('fBox').style.display=G.freq>0?'block':'none';
document.getElementById('hFreq').textContent=fmt(G.freq);
document.getElementById('haBox').style.display=G.harm>0?'block':'none';
document.getElementById('hHarm').textContent=fmt(G.harm);
let st=gStage();
document.getElementById('towerSVG').innerHTML=tSVG(st);
document.getElementById('stageBadge').textContent='Стадия: '+SNAMES[st];
let bar=document.getElementById('chBar');
let act=[];
for(let ch of CH){if(G.chStart[ch.id]!==undefined)act.push(ch.nm)}
bar.innerHTML=act.length?'<div style="z-index:1">'+act.map(n=>'<span class="ch-tag">'+n+'</span>').join('')+'</div>':'';
}

function buyB(id){
let b=BLD.find(x=>x.id===id);if(!b)return;
let cnt=bc(id),amt=bBA(b,cnt);if(amt<=0)return;
let cost=bBC(b,cnt,amt);
let dc=Math.ceil(cost*(cMod().costM||1));
if(G.sig<dc)return;
G.sig-=dc;G.bld[id]=(G.bld[id]||0)+amt;
recalc();rBld();rUpg();
}
function buyU(id){
let u=UPG.find(x=>x.id===id);if(!u||G.upg[id]||G.sig<u.cost||!u.req())return;
G.sig-=u.cost;G.upg[id]=true;recalc();rUpg();rBld();
notify(u.nm,u.desc);
}
function doPre(){
let g=pGain();if(g<=0||!confirm('Сбросить ради '+g+' кристаллов частоты?'))return;
G.freq+=g;G.sig=0;G.tot=0;G.totAll=0;G.bld={};G.upg={};
recalc();renderAll();notify('🔴 Резонанс','+'+g+' кристаллов');save();
}
function doHarm(){
let g=hGain();if(g<=0||!confirm('Сбросить всё ради '+g+' гармоник?'))return;
G.harm+=g;G.freq=0;G.sig=0;G.tot=0;G.totAll=0;G.bld={};G.upg={};
recalc();renderAll();notify('🔵 Гармоники','+'+g+' гармоник');save();
}
function startCh(id){
let ch=CH.find(x=>x.id===id);if(!ch||G.chStart[id]!==undefined||G.chDone[ch.rw]||!ch.req())return;
if(!confirm('Начать "'+ch.nm+'"?\n'+ch.desc+'\nДлительность: '+ch.dur+' секунд'))return;
G.chStart[id]=Date.now();
recalc();rChal();notify('🔥 '+ch.nm,ch.desc);
}

function autoTick(){
if(G.autoB){
let best=null,bv=0,cm=cMod();
for(let b of BLD){
let cnt=bc(b.id),cost=bC(b,cnt)*(cm.costM||1);
let sg=b.sps*bMult(b.id);
let v=cost>0?sg/cost:0;
if(v>bv&&G.sig>=cost){bv=v;best=b}
}
if(best){
let cnt=bc(best.id),amt=Math.min(G.buy,bBA(best,cnt));
if(amt>0){let cost=bBC(best,cnt,amt)*(cm.costM||1);if(G.sig>=cost){G.sig-=cost;G.bld[best.id]=(G.bld[best.id]||0)+amt}}
}
}
if(G.autoU){
for(let u of UPG)if(!G.upg[u.id]&&u.req()&&G.sig>=u.cost){G.sig-=u.cost;G.upg[u.id]=true;notify('⚡ '+u.nm,u.desc)}
}
}

document.getElementById('clickOverlay').addEventListener('click',function(e){
let pow=cPow();
G.sig+=pow;G.tot+=pow;G.totAll+=pow;G.clicks++;
let area=document.getElementById('towerArea');
let rect=area.getBoundingClientRect();
let x=e.clientX-rect.left,y=e.clientY-rect.top;
let f=document.createElement('div');f.className='fnum';
f.textContent='+'+fmt(pow);f.style.left=x+'px';f.style.top=(y-15)+'px';
area.appendChild(f);setTimeout(()=>f.remove(),900);
let g=document.createElement('div');g.className='glow';
g.style.left=x+'px';g.style.top=y+'px';area.appendChild(g);setTimeout(()=>g.remove(),300);
let s=document.createElement('div');s.className='shock';
s.style.left=x+'px';s.style.top=y+'px';area.appendChild(s);setTimeout(()=>s.remove(),500);
let cols=['#EA212E','#77C7E6','#FDFDFD','#3388BB','#104586'];
let n=Math.min(6+Math.floor(Math.min(Math.log10(Math.max(pow,1))/3,2)),12);
for(let i=0;i<n;i++){
let p=document.createElement('div');p.className='burst';
p.style.left=x+'px';p.style.top=y+'px';
let a=Math.random()*Math.PI*2,d=30+Math.random()*60;
p.style.setProperty('--tx',Math.cos(a)*d+'px');
p.style.setProperty('--ty',Math.sin(a)*d+'px');
let c=cols[Math.floor(Math.random()*cols.length)];
p.style.background=c;p.style.color=c;
area.appendChild(p);setTimeout(()=>p.remove(),600);
}
let ce=document.getElementById('sCount');ce.classList.add('pop');
setTimeout(()=>ce.classList.remove('pop'),150);
recalc();upd();
});

function spawnStar(){
let panel=document.getElementById('panel');
let s=document.createElement('div');s.className='golden';s.textContent='🌟';
s.style.left=(15+Math.random()*70)+'%';s.style.top=(15+Math.random()*70)+'%';
panel.appendChild(s);
s.addEventListener('click',function(e){
e.stopPropagation();
let r=Math.random(),bonus=0,msg='';
if(r<.4){bonus=Math.max(G.sps*60,cPow()*50);msg='+'+fmt(bonus)}
else if(r<.75){bonus=Math.max(G.sps*300,cPow()*250);msg='МЕГА: +'+fmt(bonus)}
else{msg='БЕЗУМИЕ! +SPS×7 на 15с';
let fid=setInterval(()=>{let b2=G.sps*7;G.sig+=b2;G.tot+=b2;G.totAll+=b2;upd()},2000);
setTimeout(()=>{clearInterval(fid);recalc()},15000);
}
G.sig+=bonus;G.tot+=bonus;G.totAll+=bonus;
notify('🌟 Золотой',msg);s.remove();recalc();upd();
});
setTimeout(()=>{if(s.parentNode)s.remove()},6000);
}
setInterval(()=>{if(Math.random()<.03)spawnStar()},10000);

function recalc(){G.sps=tSps()}
function tick(){
let dt=(Date.now()-G.last)/1000;G.last=Date.now();
let e=G.sps*dt;if(e>0){G.sig+=e;G.tot+=e;G.totAll+=e}

let now=Date.now();
let cm=cMod();
for(let ch of CH){
let ts=G.chStart[ch.id];
if(ts!==undefined){
let baseDur=ch.dur*(cm.durM||1);
let elapsed=(now-ts)/1000;
if(elapsed>=baseDur){
G.chDone[ch.rw]=true;
delete G.chStart[ch.id];
notify('🎉 '+ch.nm+' пройден!',ch.rwD);
recalc();
}
}
}

for(let a of ACH)if(!G.ach[a.id]&&a.ck()){G.ach[a.id]=true;notify('🏆 '+a.nm,a.desc)}
recalc();upd();
}
function notify(t,m){
let n=document.createElement('div');n.className='notif';
n.innerHTML='<div class="ntitle">'+t+'</div><div class="ntext">'+m+'</div>';
document.body.appendChild(n);setTimeout(()=>n.remove(),3000);
}
function renderAll(){upd();rBuyRow();rBld();rUpg();rAch();rPre();rChal();rAuto();rStats()}

function toggleTheme(){
G.theme=G.theme==='dark'?'light':'dark';
if(G.theme==='light'){
document.body.classList.add('light');
}else{
document.body.classList.remove('light');
}
save();
}

function save(){
const data=JSON.stringify(G);
if(window.Telegram&&Telegram.WebApp&&Telegram.WebApp.CloudStorage){
Telegram.WebApp.CloudStorage.setItem('rtrs_v2',data,(err,result)=>{
if(!err)console.log('Saved to cloud');
});
}
try{localStorage.setItem('rtrs_v2',data);}catch(e){}
}

function load(){
if(window.Telegram&&Telegram.WebApp&&Telegram.WebApp.CloudStorage){
Telegram.WebApp.CloudStorage.getItem('rtrs_v2',(err,value)=>{
if(!err&&value){
try{
const d=JSON.parse(value);
for(let k in d)if(G.hasOwnProperty(k))G[k]=d[k];
if(G.theme==='light')document.body.classList.add('light');
recalc();
renderAll();
return;
}catch(e){}
}
loadLocal();
});
}else{
loadLocal();
}
}

function loadLocal(){
let r=localStorage.getItem('rtrs_v2');
if(!r)r=localStorage.getItem('rtrs6');
if(!r)r=localStorage.getItem('rtrs5');
if(!r)r=localStorage.getItem('rtrs_save');
if(!r)return;
try{
let d=JSON.parse(r);
for(let k in d)if(G.hasOwnProperty(k))G[k]=d[k];
if(G.theme==='light')document.body.classList.add('light');
let off=(Date.now()-(d.last||Date.now()))/1000;
if(off>10){
recalc();
let g=G.sps*off*0.5;
if(g>0){
G.sig+=g;G.tot+=g;G.totAll+=g;
setTimeout(()=>notify('📡 Оффлайн','+'+fmt(g)+' за '+fmtT(off*1000)),600);
}
}
}catch(e){console.error(e);}
}

const tg=window.Telegram.WebApp;
tg.expand();
tg.ready();

if(tg.colorScheme==='dark'){
G.theme='dark';
document.body.classList.remove('light');
}else if(tg.colorScheme==='light'){
G.theme='light';
document.body.classList.add('light');
}

tg.MainButton.setText('💾 Сохранить прогресс');
tg.MainButton.onClick(()=>{
save();
tg.showAlert('✅ Игра сохранена!');
});
tg.MainButton.show();

setInterval(tick,50);
setInterval(render,1000);
setInterval(autoTick,1000);
setInterval(save,30000);
G.last=Date.now();
load();
recalc();
renderAll();
</script>
</body>
</html>
