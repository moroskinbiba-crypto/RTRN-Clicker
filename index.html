<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>📡 RTRS Clicker</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

:root{
  --c0:#060d1a;--c1:#0a1628;--c2:#0e1f3d;--c3:#142852;--c4:#1a3366;
  --b0:#1d3b78;--b1:#2a529e;--b2:#3a6db8;
  --acc:#00d4ff;--acc2:#0099cc;--acc3:#00ffaa;
  --red:#ff4757;--red2:#cc2233;
  --gold:#ffd700;--gold2:#e6c000;
  --txt:#e8f4fd;--txt2:#8ab4d4;--txt3:#4a7a9b;
  --border:rgba(0,180,255,0.12);--border2:rgba(0,180,255,0.25);
  --shadow:0 8px 32px rgba(0,0,0,0.6);
  --r:14px;--r2:10px;--r3:6px;
}
body.light{
  --c0:#f0f4f8;--c1:#e8eef5;--c2:#dde5ef;--c3:#d0dcea;--c4:#c2cfe0;
  --b0:#b4c2d6;--b1:#8da8c4;--b2:#6b8fb0;
  --acc:#0077aa;--acc2:#005588;--acc3:#00994d;
  --red:#cc2233;--red2:#aa1122;
  --gold:#b8860b;--gold2:#9a7000;
  --txt:#1a2a3a;--txt2:#3a5a7a;--txt3:#6a8aaa;
  --border:rgba(0,100,180,0.15);--border2:rgba(0,100,180,0.3);
}

body{
  font-family:'Space Grotesk',sans-serif;
  background:var(--c0);color:var(--txt);
  overflow-x:hidden;min-height:100vh;
  touch-action:manipulation;transition:all .3s;
}

/* Animated bg */
body::before{
  content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse 60% 40% at 20% 80%, rgba(0,100,200,0.08) 0%, transparent 60%),
    radial-gradient(ellipse 40% 60% at 80% 20%, rgba(0,180,255,0.05) 0%, transparent 60%),
    radial-gradient(ellipse 30% 30% at 50% 50%, rgba(0,255,170,0.03) 0%, transparent 70%);
  pointer-events:none;z-index:0;animation:bgPulse 8s ease-in-out infinite alternate;
}
@keyframes bgPulse{0%{opacity:.6}100%{opacity:1}}

/* HEADER */
.hdr{
  position:sticky;top:0;z-index:200;
  background:rgba(10,22,40,0.92);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border2);
  padding:10px 16px;
  display:flex;align-items:center;gap:12px;flex-wrap:wrap;
}
body.light .hdr{background:rgba(240,244,248,0.92)}
.logo{
  font-family:'Space Mono',monospace;font-weight:700;font-size:1rem;
  color:var(--acc);letter-spacing:2px;text-transform:uppercase;
  text-shadow:0 0 20px rgba(0,212,255,0.5);flex-shrink:0;
}
.hstats{display:flex;gap:8px;flex:1;flex-wrap:wrap}
.hstat{
  display:flex;flex-direction:column;align-items:center;
  padding:5px 12px;
  background:rgba(0,180,255,0.06);
  border:1px solid var(--border);border-radius:var(--r3);
  min-width:65px;flex:1;
}
.hstat-l{font-size:.52rem;color:var(--txt3);text-transform:uppercase;letter-spacing:1.5px;font-weight:600}
.hstat-v{font-family:'Space Mono',monospace;font-size:.88rem;color:var(--txt);font-weight:700;margin-top:1px}
.hstat-v.blu{color:var(--acc)}.hstat-v.red{color:var(--red)}.hstat-v.gld{color:var(--gold)}
.thm{
  width:36px;height:36px;border-radius:50%;border:1px solid var(--border2);
  background:var(--c2);cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:1rem;transition:all .2s;flex-shrink:0;
}
.thm:hover{background:var(--c3);transform:scale(1.1)}

/* LAYOUT */
.wrap{
  display:grid;grid-template-columns:1fr 360px;
  min-height:calc(100vh - 56px);position:relative;z-index:1;
}

/* CLICK PANEL */
.cpanel{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:28px 20px;gap:20px;position:relative;overflow:hidden;
}

.sig-box{text-align:center}
.sig-n{
  font-family:'Space Mono',monospace;font-size:3.2rem;font-weight:700;
  color:var(--txt);line-height:1;
  text-shadow:0 0 40px rgba(0,212,255,0.3);
  transition:transform .08s;
}
.sig-n.pop{transform:scale(1.04) translateY(-2px)}
.sig-lbl{font-size:.9rem;color:var(--acc);font-weight:500;margin-top:6px;letter-spacing:1px}
.sig-sps{font-family:'Space Mono',monospace;font-size:.75rem;color:var(--txt3);margin-top:4px}

/* Challenges bar */
.ch-bar{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;min-height:0}
.ch-tag{
  padding:4px 12px;
  background:rgba(255,71,87,0.12);border:1px solid rgba(255,71,87,0.35);
  border-radius:20px;font-size:.58rem;color:var(--red);font-weight:700;letter-spacing:.5px;
  animation:tagPulse 2s ease-in-out infinite;
}
@keyframes tagPulse{0%,100%{border-color:rgba(255,71,87,0.35)}50%{border-color:rgba(255,71,87,0.7)}}

/* TOWER */
.tower-wrap{
  position:relative;cursor:pointer;user-select:none;
  width:220px;height:300px;
  filter:drop-shadow(0 0 30px rgba(0,180,255,0.15));
  transition:filter .3s;
}
.tower-wrap:hover{filter:drop-shadow(0 0 40px rgba(0,180,255,0.3))}
.tower-wrap:active{transform:scale(.97)}
.tower-svg{width:100%;height:100%;transition:transform .1s cubic-bezier(.34,1.56,.64,1)}
.t-click-zone{position:absolute;inset:0;border-radius:var(--r2)}

/* Stage badge */
.stage-b{
  font-family:'Space Mono',monospace;font-size:.6rem;color:var(--acc);
  letter-spacing:2px;text-transform:uppercase;
  padding:6px 18px;border:1px solid var(--border2);border-radius:20px;
  background:rgba(0,180,255,0.06);
}
.clk-pw{font-size:.78rem;color:var(--txt3);font-weight:500}
.clk-pw span{color:var(--acc);font-family:'Space Mono',monospace;font-weight:700}

/* Floating numbers */
.float{
  position:absolute;font-family:'Space Mono',monospace;font-weight:700;
  pointer-events:none;white-space:nowrap;z-index:50;font-size:1rem;
  animation:floatUp .9s cubic-bezier(.2,.8,.2,1) forwards;
}
@keyframes floatUp{
  0%{transform:translateY(0) scale(.7);opacity:0}
  15%{transform:translateY(-8px) scale(1.1);opacity:1}
  100%{transform:translateY(-70px) scale(.85);opacity:0}
}
.burst-p{
  position:absolute;border-radius:50%;pointer-events:none;z-index:50;
  animation:burstOut .6s cubic-bezier(.15,.8,.3,1) forwards;
}
@keyframes burstOut{0%{transform:translate(0,0) scale(1.5);opacity:1}100%{transform:translate(var(--tx),var(--ty)) scale(0);opacity:0}}

/* SHOP */
.shop{
  background:var(--c1);border-left:1px solid var(--border);
  display:flex;flex-direction:column;max-height:calc(100vh - 56px);overflow:hidden;
}
.shop-tabs{
  display:grid;grid-template-columns:repeat(4,1fr);
  padding:10px;gap:4px;
  background:var(--c1);border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:10;flex-shrink:0;
}
.stab{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:8px 4px;border:none;background:var(--c2);border-radius:var(--r3);
  cursor:pointer;font-family:'Space Grotesk',sans-serif;
  color:var(--txt3);transition:all .2s;
}
.stab:hover{background:var(--c3);color:var(--txt2)}
.stab.active{background:rgba(0,180,255,0.12);color:var(--acc);border-bottom:2px solid var(--acc)}
.stab-em{font-size:1.3rem;line-height:1}
.stab-tx{font-size:.5rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.shop-body{flex:1;overflow-y:auto;padding:14px;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.tcont{display:none}.tcont.active{display:block}

/* Buy row */
.buy-row{display:flex;gap:6px;margin-bottom:12px}
.bbtn{
  flex:1;padding:7px;border:1px solid var(--border);background:var(--c2);
  color:var(--txt3);border-radius:var(--r3);cursor:pointer;font-family:'Space Grotesk',sans-serif;
  font-size:.7rem;font-weight:700;transition:all .2s;
}
.bbtn:hover{background:var(--c3)}.bbtn.active{border-color:var(--acc);color:var(--acc);background:rgba(0,180,255,0.08)}

/* Cards */
.card{
  background:var(--c2);border:1px solid var(--border);border-radius:var(--r2);
  padding:11px;margin-bottom:8px;
  display:flex;align-items:center;gap:10px;
  cursor:pointer;transition:all .2s;position:relative;overflow:hidden;
}
.card::before{
  content:'';position:absolute;inset:0;opacity:0;
  background:linear-gradient(135deg,rgba(0,180,255,0.05),transparent);
  transition:opacity .2s;
}
.card:hover{background:var(--c3);border-color:var(--border2);transform:translateY(-1px)}
.card:hover::before{opacity:1}
.card.aff{border-color:rgba(0,212,255,0.35)}
.card.lock{opacity:.35;pointer-events:none}
.card.done{opacity:.45;pointer-events:none;background:var(--c1)}
.cicon{
  width:40px;height:40px;background:var(--c3);border-radius:var(--r3);
  display:flex;align-items:center;justify-content:center;font-size:1.2rem;
  flex-shrink:0;border:1px solid var(--border);
}
.ci{flex:1;min-width:0}
.cn{font-size:.73rem;font-weight:700;color:var(--txt);margin-bottom:2px}
.cd{font-size:.6rem;color:var(--txt3);margin-bottom:3px;line-height:1.3}
.cs{font-size:.6rem;color:var(--acc);font-weight:600}
.cr{text-align:right;flex-shrink:0}
.cc{font-family:'Space Mono',monospace;font-size:.72rem;font-weight:700;color:var(--txt)}
.cc.no{color:var(--red)}.cc.ok{color:var(--acc3)}.cc.some{color:var(--gold)}
.cct{font-size:.57rem;color:var(--txt3);margin-top:2px;font-weight:600}

/* Section label */
.slbl{
  font-size:.55rem;color:var(--txt3);text-transform:uppercase;letter-spacing:2px;
  margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border);font-weight:700;
}

/* Upgrade card */
.ucard.aff{border-color:rgba(255,71,87,0.4)}
.ucost{font-family:'Space Mono',monospace;font-size:.72rem;font-weight:700;color:var(--txt)}
.ucost.no{color:var(--red)}

/* Achievements */
.achcard.unl{border-color:rgba(255,215,0,0.4);background:rgba(255,215,0,0.04)}
.achi{width:38px;height:38px;border-radius:var(--r3);display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;background:var(--c3);border:1px solid var(--border)}
.achcard.unl .achi{border-color:rgba(255,215,0,0.5)}
.achn{font-size:.65rem;font-weight:700;color:var(--gold);margin-bottom:2px}

/* Progress bar */
.pbar{height:6px;background:var(--c1);border-radius:3px;overflow:hidden;margin-top:6px;border:1px solid var(--border)}
.pfill{height:100%;background:linear-gradient(90deg,var(--red),#ff6b7a);border-radius:3px;transition:width .4s ease}
.pfill.done{background:linear-gradient(90deg,var(--acc),var(--acc3))}
.ptxt{font-size:.58rem;color:var(--txt3);margin-top:5px;font-weight:600}

/* Prestige sections */
.psec{
  text-align:center;padding:18px 14px;margin-bottom:12px;
  background:var(--c2);border:1px solid var(--border);border-radius:var(--r2);
  position:relative;overflow:hidden;
}
.psec::before{
  content:'';position:absolute;inset:0;opacity:.04;
  background:radial-gradient(circle at 50% 0%,var(--acc),transparent 70%);
}
.psec h3{font-family:'Space Mono',monospace;font-size:.95rem;margin-bottom:8px;color:var(--txt);font-weight:700}
.psec p{font-size:.68rem;color:var(--txt3);margin-bottom:10px;line-height:1.5}
.pbtn{
  font-family:'Space Grotesk',sans-serif;font-size:.72rem;font-weight:700;
  padding:9px 22px;border:1px solid;border-radius:var(--r3);cursor:pointer;
  transition:all .2s;text-transform:uppercase;letter-spacing:1px;background:var(--c3);margin:6px 0;
}
.pbtn.red{border-color:var(--red);color:var(--red)}
.pbtn.red:not(:disabled):hover{background:var(--red);color:var(--c0)}
.pbtn.blu{border-color:var(--acc);color:var(--acc)}
.pbtn.blu:not(:disabled):hover{background:var(--acc);color:var(--c0)}
.pbtn:disabled{opacity:.25;cursor:not-allowed;background:var(--c2)!important;color:var(--txt3)!important;border-color:var(--border)!important}

/* Challenge cards */
.chcard{
  background:var(--c2);border:1px solid var(--border);border-radius:var(--r2);
  padding:11px;margin-bottom:8px;cursor:pointer;transition:all .2s;
}
.chcard:hover:not(.done){border-color:var(--border2);transform:translateY(-1px)}
.chcard.active{border-color:rgba(255,71,87,0.5);background:rgba(255,71,87,0.04)}
.chcard.done{opacity:.5;pointer-events:none}
.chn{font-size:.72rem;font-weight:700;color:var(--txt);margin-bottom:3px}
.chd{font-size:.62rem;color:var(--txt3);margin-bottom:4px;line-height:1.4}
.chr{font-size:.6rem;color:var(--acc);font-weight:600}

/* Auto toggles */
.arow{display:flex;align-items:center;justify-content:space-between;padding:11px;margin-bottom:8px;background:var(--c2);border:1px solid var(--border);border-radius:var(--r2)}
.albl{font-size:.7rem;color:var(--txt);font-weight:600}
.adsc{font-size:.6rem;color:var(--txt3);margin-top:2px}
.tgl{width:44px;height:24px;border-radius:12px;background:var(--c3);border:1px solid var(--border);cursor:pointer;position:relative;transition:all .25s;flex-shrink:0}
.tgl.on{background:var(--acc2);border-color:var(--acc)}
.tgl::after{content:'';position:absolute;width:18px;height:18px;border-radius:50%;background:var(--txt);top:2px;left:2px;transition:transform .25s;box-shadow:0 2px 4px rgba(0,0,0,.4)}
.tgl.on::after{transform:translateX(20px)}

/* Stats */
.srow{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border);font-size:.73rem}
.slb{color:var(--txt3);font-weight:500}
.sv{font-family:'Space Mono',monospace;font-size:.68rem;color:var(--acc);font-weight:700}

/* Notification */
.notif{
  position:fixed;top:66px;right:14px;z-index:1000;max-width:280px;
  background:var(--c3);border:1px solid var(--border2);border-radius:var(--r2);
  padding:11px 14px;box-shadow:var(--shadow);
  animation:nIn .3s cubic-bezier(.34,1.56,.64,1),nOut .4s ease-in 2.4s forwards;
}
@keyframes nIn{from{transform:translateX(120%) scale(.9);opacity:0}to{transform:translateX(0) scale(1);opacity:1}}
@keyframes nOut{from{transform:translateX(0);opacity:1}to{transform:translateX(120%);opacity:0}}
.nt{font-family:'Space Mono',monospace;font-size:.68rem;color:var(--txt);margin-bottom:3px;font-weight:700}
.nb{font-size:.62rem;color:var(--acc);line-height:1.4}

/* Offline overlay */
.off-ov{
  position:fixed;inset:0;z-index:2000;
  background:rgba(6,13,26,0.95);backdrop-filter:blur(10px);
  display:flex;align-items:center;justify-content:center;
}
.off-card{
  background:var(--c2);border:1px solid var(--border2);border-radius:var(--r);
  padding:32px;text-align:center;max-width:320px;
}
.off-card h2{font-family:'Space Mono',monospace;color:var(--acc);margin-bottom:12px;font-size:1.1rem}
.off-card p{color:var(--txt2);font-size:.8rem;line-height:1.6;margin-bottom:20px}
.off-card .pbtn{display:block;width:100%}

/* Pulse ring on tower */
@keyframes ringPulse{0%{transform:translate(-50%,-50%) scale(1);opacity:.6}100%{transform:translate(-50%,-50%) scale(1.5);opacity:0}}
.ring{
  position:absolute;left:50%;top:45%;
  width:120px;height:120px;border-radius:50%;
  border:2px solid var(--acc);pointer-events:none;
  transform:translate(-50%,-50%);
  animation:ringPulse 2s ease-out infinite;
}
.ring2{animation-delay:.7s;border-color:rgba(0,212,255,0.4)}

/* Scanline effect on click */
@keyframes scan{0%{background-position:0 -100%}100%{background-position:0 100%}}
.scan-line{
  position:absolute;inset:0;pointer-events:none;border-radius:var(--r2);opacity:0;
  background:repeating-linear-gradient(0deg,transparent 0px,transparent 3px,rgba(0,212,255,.03) 3px,rgba(0,212,255,.03) 4px);
  animation:scan 3s linear infinite;
}
.tower-wrap:hover .scan-line{opacity:1}

/* Glitch on click */
@keyframes glitch{0%,100%{clip-path:inset(0)}10%{clip-path:inset(10% 0 80% 0)}30%{clip-path:inset(40% 0 40% 0)}50%{clip-path:inset(80% 0 10% 0)}60%{clip-path:inset(0 0 0 0)}}
.glitch{animation:glitch .15s steps(1) 1}

/* Mobile */
@media(max-width:780px){
  .wrap{grid-template-columns:1fr;grid-template-rows:auto 1fr}
  .shop{max-height:none;border-left:none;border-top:1px solid var(--border)}
  .sig-n{font-size:2.4rem}
  .cpanel{min-height:42vh;padding:18px 14px;gap:14px}
  .tower-wrap{width:180px;height:240px}
  .shop-tabs{grid-template-columns:repeat(4,1fr)}
  .hdr{gap:8px}
  .logo{font-size:.85rem}
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="hdr">
  <div class="logo">📡 RTRS</div>
  <div class="hstats">
    <div class="hstat"><div class="hstat-l">Сигналы</div><div class="hstat-v" id="hSig">0</div></div>
    <div class="hstat"><div class="hstat-l">В секунду</div><div class="hstat-v blu" id="hSps">0</div></div>
    <div class="hstat" id="fBox" style="display:none"><div class="hstat-l">Частота</div><div class="hstat-v red" id="hFreq">0</div></div>
    <div class="hstat" id="haBox" style="display:none"><div class="hstat-l">Гармоники</div><div class="hstat-v gld" id="hHarm">0</div></div>
  </div>
  <button class="thm" onclick="toggleTheme()" title="Сменить тему">🌓</button>
</div>

<div class="wrap">
  <!-- CLICK PANEL -->
  <div class="cpanel" id="cpanel">
    <div class="sig-box">
      <div class="sig-n" id="sCount">0</div>
      <div class="sig-lbl">сигналов</div>
      <div class="sig-sps" id="spsTxt">0 с/сек</div>
    </div>

    <div class="ch-bar" id="chBar"></div>

    <div class="tower-wrap" id="towerWrap">
      <div class="ring"></div>
      <div class="ring ring2"></div>
      <div class="scan-line"></div>
      <div id="towerSVG"></div>
      <div class="t-click-zone" id="clickZone"></div>
    </div>

    <div class="stage-b" id="stageBadge">Стадия: Антенна</div>
    <div class="clk-pw">Клик: <span id="cpVal">1</span> сигнал</div>
  </div>

  <!-- SHOP -->
  <div class="shop">
    <div class="shop-tabs">
      <button class="stab active" onclick="openTab(this,'b')"><span class="stab-em">🏗️</span><span class="stab-tx">Здания</span></button>
      <button class="stab" onclick="openTab(this,'u')"><span class="stab-em">⚡</span><span class="stab-tx">Апгрейд</span></button>
      <button class="stab" onclick="openTab(this,'c')"><span class="stab-em">🔥</span><span class="stab-tx">Испыт.</span></button>
      <button class="stab" onclick="openTab(this,'a')"><span class="stab-em">🏆</span><span class="stab-tx">Награды</span></button>
      <button class="stab" onclick="openTab(this,'p')"><span class="stab-em">🌌</span><span class="stab-tx">Престиж</span></button>
      <button class="stab" onclick="openTab(this,'m')"><span class="stab-em">🤖</span><span class="stab-tx">Авто</span></button>
      <button class="stab" onclick="openTab(this,'s')"><span class="stab-em">📊</span><span class="stab-tx">Статы</span></button>
    </div>
    <div class="shop-body">
      <div class="tcont active" id="tb"><div class="buy-row" id="buyRow"></div><div id="bList"></div></div>
      <div class="tcont" id="tu"><div id="uList"></div></div>
      <div class="tcont" id="tc"><div id="cList"></div></div>
      <div class="tcont" id="ta"><div id="aList"></div></div>
      <div class="tcont" id="tp"><div id="pList"></div></div>
      <div class="tcont" id="tm"><div id="mList"></div></div>
      <div class="tcont" id="ts"><div id="stList"></div></div>
    </div>
  </div>
</div>

<script>
// ════════════════════════════════════════
// STATE
// ════════════════════════════════════════
let G = {
  sig:0, tot:0, totAll:0, clicks:0,
  freq:0, harm:0, buy:1,
  bld:{}, upg:{}, ach:{}, chDone:{}, chStart:{},
  autoB:false, autoU:false, theme:'dark',
  start:Date.now(), last:Date.now(), sps:0

function gStage(){
  if(G.totAll>=1e12) return 4;
  if(G.totAll>=1e9)  return 3;
  if(G.totAll>=1e6)  return 2;
  if(G.totAll>=1e4)  return 1;
  return 0;
}
function bc(id){return G.bld[id]||0}
function tB(){return Object.values(G.bld).reduce((a,b)=>a+b,0)}
function bCost(b,n){return Math.ceil(b.cost*Math.pow(b.cm,n))}
function bBulkCost(b,n,amt){let t=0;for(let i=0;i<amt;i++)t+=bCost(b,n+i);return t}
function bMaxBuy(b,n){
  let a=0,t=0;
  while(a<G.buy){let c=bCost(b,n+a);if(t+c>G.sig)break;t+=c;a++}
  return a;
}
function pGain(){return G.totAll<1e6?0:Math.floor(Math.pow(G.totAll/1e6,.5))}
function hGain(){return G.freq<1e3?0:Math.floor(Math.pow(G.freq/1e3,.5))}

function cMod(){
  let m={spsM:1,clkM:1,prodM:1,costM:1,freqM:1};
  for(let ch of CH) if(G.chStart[ch.id]) for(let k in ch.mod) m[k]*=ch.mod[k];
  return m;
}

function recalc(){
  const cm = cMod();
  // Click power
  let cp = 1;
  for(let u of UPG) if(G.upg[u.id] && u.tp==='clk') cp*=u.m;
  cp *= cm.clkM * (1+G.freq*.05) * (1+G.harm*.1);
  if(G.chDone.pc1) cp*=1.05;
  if(G.chDone.pc5) cp*=1.2;
  Cache.click = Math.max(1, cp);

  // SPS
  let glb=1;
  for(let u of UPG) if(G.upg[u.id] && u.tp==='glb') glb*=u.m;
  glb *= (1+G.freq*.05) * (1+G.harm*.1) * cm.prodM;
  if(G.chDone.pc2) glb*=1.1;
  if(G.chDone.pc4) glb*=1.15;
  if(G.chDone.pc6) glb*=1.25;

  let tsps=0;
  for(let b of BLD){
    let bm=glb;
    for(let u of UPG) if(G.upg[u.id] && u.tp==='bld' && u.b===b.id) bm*=u.m;
    Cache.bMult[b.id]=bm;
    tsps+=b.sps*bm*(G.bld[b.id]||0);
  }
  Cache.sps = tsps * cm.spsM;
  G.sps = Cache.sps;
}

function fmt(n){
  if(n==null||isNaN(n)) return '0';
  if(n<0) n=0;
  if(n<1) return n.toFixed(1);
  if(n<1e4) return Math.floor(n).toLocaleString('ru');
  if(n<1e6) return (n/1e3).toFixed(1)+'K';
  if(n<1e9) return (n/1e6).toFixed(2)+'M';
  if(n<1e12) return (n/1e9).toFixed(2)+'B';
  if(n<1e15) return (n/1e12).toFixed(2)+'T';
  return n.toExponential(2);
}
function fmtT(ms){
  let s=Math.floor(ms/1e3), m=Math.floor(s/60); s%=60;
  let h=Math.floor(m/60); m%=60; let d=Math.floor(h/24); h%=24;
  if(d>0) return d+'д '+h+'ч';
  if(h>0) return h+'ч '+m+'м';
  if(m>0) return m+'м '+s+'с';
  return s+'с';
}

function rBld(){
  const cm = cMod();
  let h='';
  for(let b of BLD){
    const cnt = bc(b.id);
    const buyAmt = bMaxBuy(b, cnt);
    const cost = buyAmt>0 ? bBulkCost(b,cnt,buyAmt) : bBulkCost(b,cnt,G.buy);
    const dc = Math.ceil(cost*(cm.costM||1));
    const aff = buyAmt>0 && G.sig>=bBulkCost(b,cnt,1);
    const locked = cnt===0 && G.tot < b.cost*.35;
    const sps = b.sps*(Cache.bMult[b.id]||1);
    const tot = sps*cnt;
    let cc = 'cc';
    if(G.sig>=dc) cc='cc ok'; else if(buyAmt>0) cc='cc some'; else cc='cc no';
    if(locked){h+=`<div class="card lock"><div class="cicon">🔒</div><div class="ci"><div class="cn">${b.name}</div><div class="cd">${b.desc}</div></div><div class="cr"><div class="cc no">???</div></div></div>`;continue;}
    h+=`<div class="card${aff?' aff':''}" onclick="buyB('${b.id}')">
      <div class="cicon">${b.ic}</div>
      <div class="ci"><div class="cn">${b.name}</div><div class="cd">${b.desc}</div><div class="cs">+${fmt(sps)}/с · всего ${fmt(tot)}</div></div>
      <div class="cr"><div class="${cc}">${fmt(dc)}</div><div class="cct">${cnt}${buyAmt>1?' (×'+buyAmt+')':''}</div></div>
    </div>`;
  }
  document.getElementById('bList').innerHTML=h;
}

// ════════════════════════════════════════
// RENDER UPGRADES
// ════════════════════════════════════════
function rUpg(){
  let h='', av=0;
  const avail=[], done=[];
  for(let u of UPG){
    if(G.upg[u.id]){done.push(u);continue}
    if(!u.req()) continue;
    av++;
    const aff=G.sig>=u.cost;
    avail.push(`<div class="card ucard${aff?' aff':''}" onclick="buyU('${u.id}')">
      <div class="cicon">${u.ic}</div>
      <div class="ci"><div class="cn">${u.nm}</div><div class="cd">${u.desc}</div></div>
      <div class="cr"><div class="ucost${aff?'':' no'}">${fmt(u.cost)}</div></div>
    </div>`);
  }
  if(!av) h='<div style="text-align:center;color:var(--txt3);padding:24px;font-size:.75rem;border:1px solid var(--border);border-radius:var(--r2);background:var(--c2)">Нет доступных улучшений</div>';
  else h=avail.join('');
  if(done.length){
    h+=`<div class="slbl" style="margin-top:14px">Куплено (${done.length})</div>`;
    h+=done.map(u=>`<div class="card done"><div class="cicon">${u.ic}</div><div class="ci"><div class="cn">${u.nm} ✓</div><div class="cd">${u.desc}</div></div></div>`).join('');
  }
  document.getElementById('uList').innerHTML=h;
}

// ════════════════════════════════════════
// RENDER ACHIEVEMENTS
// ════════════════════════════════════════
function rAch(){
  const unl=ACH.filter(a=>G.ach[a.id]).length;
  let h=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
    <div class="slbl" style="margin:0;border:none;padding:0">Достижения</div>
    <div style="font-family:'Space Mono',monospace;font-size:.7rem;color:var(--gold)">${unl}/${ACH.length}</div>
  </div>`;
  const pw = Math.round(unl/ACH.length*100);
  h+=`<div class="pbar"><div class="pfill${unl>=ACH.length?' done':''}" style="width:${pw}%"></div></div><div class="ptxt">${pw}% выполнено</div><br>`;
  for(let a of ACH){
    const u=G.ach[a.id];
    h+=`<div class="card achcard${u?' unl':' lock'}">
      <div class="achi">${u?a.ic:'🔒'}</div>
      <div class="ci"><div class="achn">${u?a.nm:'???'}</div><div class="cd">${a.desc}</div></div>
    </div>`;
  }
  document.getElementById('aList').innerHTML=h;
}

// ════════════════════════════════════════
// RENDER PRESTIGE
// ════════════════════════════════════════
function rPre(){
  const fg=pGain(), hg=hGain();
  let h=`<div class="psec">
    <h3>🔴 Резонанс Частоты</h3>
    <p>Сброс прогресса → кристаллы частоты<br>Каждый кристалл даёт +5% ко всему</p>
    <div style="font-size:.65rem;color:var(--txt3);margin-bottom:4px">Получите: <span style="color:var(--red);font-family:'Space Mono',monospace;font-size:.85rem;font-weight:700">+${fmt(fg)}</span></div>
    <div style="font-size:.6rem;color:var(--txt3);margin-bottom:10px">Уже есть: ${G.freq} (+${G.freq*5}%)</div>
    <button class="pbtn red" onclick="doPre()" ${fg<=0?'disabled':''}>Сбросить прогресс</button>
  </div>`;
  h+=`<div class="psec">
    <h3>🔵 Гармоники</h3>
    <p>Великий сброс → гармоники<br>Каждая гармоника даёт +10% ко ВСЕМУ</p>
    <div style="font-size:.65rem;color:var(--txt3);margin-bottom:4px">Получите: <span style="color:var(--acc);font-family:'Space Mono',monospace;font-size:.85rem;font-weight:700">+${fmt(hg)}</span></div>
    <div style="font-size:.6rem;color:var(--txt3);margin-bottom:10px">Уже есть: ${G.harm} (+${G.harm*10}%)</div>
    <button class="pbtn blu" onclick="doHarm()" ${hg<=0?'disabled':''}>Великий сброс</button>
  </div>`;
  document.getElementById('pList').innerHTML=h;
}

// ════════════════════════════════════════
// RENDER CHALLENGES
// ════════════════════════════════════════
function rChal(){
  const now=Date.now(), cm=cMod();
  let h='';
  const active=CH.filter(c=>G.chStart[c.id]!==undefined);
  if(active.length){
    h+=`<div class="slbl">Активные испытания</div>`;
    for(let ch of active){
      const elapsed=(now-G.chStart[ch.id])/1000;
      const dur=ch.dur;
      const pct=Math.min((elapsed/dur)*100,100);
      const done=pct>=100;
      const tl=Math.max(dur-elapsed,0);
      h+=`<div class="chcard active">
        <div class="chn">🔥 ${ch.nm}</div>
        <div class="chd">${ch.desc}</div>
        <div class="pbar"><div class="pfill${done?' done':''}" style="width:${pct}%"></div></div>
        <div class="ptxt">${done?'✓ Завершается...':Math.ceil(tl)+'с осталось · '+Math.round(pct)+'%'}</div>
      </div>`;
    }
    h+=`<br>`;
  }
  h+=`<div class="slbl">Доступные испытания</div>`;
  for(let ch of CH){
    const isActive=G.chStart[ch.id]!==undefined;
    const isDone=G.chDone[ch.rw];
    const canStart=!isActive&&!isDone&&ch.req();
    h+=`<div class="chcard${isDone?' done':isActive?' active':''}" ${canStart?`onclick="startCh('${ch.id}')"`:''}>
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div class="chn">${ch.nm}${isActive?' 🔥':''}${isDone?' ✓':''}</div>
        <span style="font-size:.57rem;font-weight:700;color:${ch.dCol||'#ff4757'};padding:2px 8px;border:1px solid ${ch.dCol||'#ff4757'};border-radius:10px;opacity:.8">${ch.diff}</span>
      </div>
      <div class="chd">${ch.desc}</div>
      <div class="chr">${isDone?'🎁 Получено: ':'Награда: '}${ch.rwD}</div>
      ${!isDone&&!isActive?`<div style="font-size:.55rem;color:var(--txt3);margin-top:3px">Требуется: ${fmt(ch.reqVal)} сигналов · ${ch.dur}с</div>`:''}
    </div>`;
  }
  document.getElementById('cList').innerHTML=h;
}

// ════════════════════════════════════════
// RENDER AUTO
// ════════════════════════════════════════
function rAuto(){
  let h='<div class="slbl">Автоматизация</div>';
  if(G.freq<=0&&G.harm<=0){
    h+=`<div style="text-align:center;padding:24px;color:var(--txt3);font-size:.72rem;background:var(--c2);border-radius:var(--r2);border:1px solid var(--border);line-height:1.6">
      🔒 Автоматизация разблокируется<br>после первого престижа
    </div>`;
  } else {
    h+=`<div class="arow"><div><div class="albl">🏗️ Авто-здания</div><div class="adsc">Покупает лучшие здания по соотношению SPS/цена</div></div><div class="tgl${G.autoB?' on':''}" onclick="togA('b')"></div></div>`;
    h+=`<div class="arow"><div><div class="albl">⚡ Авто-улучшения</div><div class="adsc">Покупает все доступные улучшения</div></div><div class="tgl${G.autoU?' on':''}" onclick="togA('u')"></div></div>`;
  }
  document.getElementById('mList').innerHTML=h;
}
function togA(t){if(t==='b')G.autoB=!G.autoB;else G.autoU=!G.autoU;rAuto()}

// ════════════════════════════════════════
// RENDER STATS
// ════════════════════════════════════════
function rStats(){
  const rows=[
    ['💰 Сигналы сейчас', fmt(G.sig)],
    ['📈 Всего заработано', fmt(G.totAll)],
    ['⚡ Сигналов/сек',    fmt(Cache.sps)],
    ['👆 Сила клика',      fmt(Cache.click)],
    ['🖱️ Всего кликов',   G.clicks.toLocaleString('ru')],
    ['🏗️ Зданий',         tB()],
    ['⚡ Улучшений',       Object.keys(G.upg).length+'/'+UPG.length],
    ['🏆 Достижений',      Object.keys(G.ach).length+'/'+ACH.length],
    ['🔴 Кристаллы',      G.freq],
    ['🔵 Гармоники',      G.harm],
    ['⏱️ Время в игре',   fmtT(Date.now()-G.start)],
  ];
  document.getElementById('stList').innerHTML=
    '<div class="slbl">Статистика</div>'+
    rows.map(([l,v])=>`<div class="srow"><span class="slb">${l}</span><span class="sv">${v}</span></div>`).join('');
}

// ════════════════════════════════════════
// RENDER DISPATCH
// ════════════════════════════════════════
function render(){
  const tab=document.querySelector('.stab.active');
  if(!tab) return;
  const tx=tab.querySelector('.stab-tx')?.textContent||'';
  if(tx.includes('Зд')) rBld();
  else if(tx.includes('Апг')) rUpg();
  else if(tx.includes('Исп')) rChal();
  else if(tx.includes('Нагр')) rAch();
  else if(tx.includes('Пр')) rPre();
  else if(tx.includes('Авт')) rAuto();
  else if(tx.includes('Ст')) rStats();
}

// ════════════════════════════════════════
// HUD UPDATE
// ════════════════════════════════════════
function upd(){
  document.getElementById('sCount').textContent=fmt(G.sig);
  document.getElementById('hSig').textContent=fmt(G.sig);
  document.getElementById('hSps').textContent=fmt(Cache.sps)+'/с';
  document.getElementById('spsTxt').textContent=fmt(Cache.sps)+' с/сек';
  document.getElementById('cpVal').textContent=fmt(Cache.click);
  document.getElementById('fBox').style.display=G.freq>0?'':'none';
  document.getElementById('hFreq').textContent=G.freq;
  document.getElementById('haBox').style.display=G.harm>0?'':'none';
  document.getElementById('hHarm').textContent=G.harm;
  const st=gStage();
  document.getElementById('towerSVG').innerHTML=tSVG(st);
  document.getElementById('stageBadge').textContent='Стадия: '+SNAMES[Math.min(st,SNAMES.length-1)];
  // active challenge bar
  const now=Date.now(), cm=cMod();
  const tags=CH.filter(c=>G.chStart[c.id]!==undefined).map(c=>{
    const tl=Math.max(c.dur-((now-G.chStart[c.id])/1000),0);
    return `<div class="ch-tag">🔥 ${c.nm} ${Math.ceil(tl)}с</div>`;
  });
  document.getElementById('chBar').innerHTML=tags.join('');
}

// ════════════════════════════════════════
// ACTIONS
// ════════════════════════════════════════
function buyB(id){
  const b=BLD.find(x=>x.id===id);
  if(!b) return;
  const cnt=bc(id);
  const amt=bMaxBuy(b,cnt);
  if(amt<=0) return;
  const dc=Math.ceil(bBulkCost(b,cnt,amt)*(cMod().costM||1));
  if(G.sig<dc) return;
  G.sig-=dc;
  G.bld[id]=(G.bld[id]||0)+amt;
  recalc();rBld();rUpg();
}

function buyU(id){
  const u=UPG.find(x=>x.id===id);
  if(!u||G.upg[id]||G.sig<u.cost||!u.req()) return;
  G.sig-=u.cost;
  G.upg[id]=true;
  recalc();rUpg();rBld();
  notify('⚡ '+u.nm, u.desc);
}

function doPre(){
  const g=pGain();
  if(g<=0||!confirm('Сбросить прогресс ради +'+g+' кристаллов частоты?')) return;
  G.freq+=g;
  G.sig=0;G.tot=0;G.totAll=0;G.bld={};G.upg={};
  recalc();renderAll();
  notify('🔴 Резонанс','+'+g+' кристаллов частоты');
  save();
}

function doHarm(){
  const g=hGain();
  if(g<=0||!confirm('Великий сброс ради +'+g+' гармоник?')) return;
  G.harm+=g;G.freq=0;
  G.sig=0;G.tot=0;G.totAll=0;G.bld={};G.upg={};
  recalc();renderAll();
  notify('🔵 Гармоники','+'+g+' гармоник');
  save();
}

function startCh(id){
  const ch=CH.find(x=>x.id===id);
  if(!ch||G.chStart[id]!==undefined||G.chDone[ch.rw]||!ch.req()) return;
  if(!confirm('Начать испытание "'+ch.nm+'"?\n'+ch.desc+'\nПродолжительность: '+ch.dur+'с')) return;
  G.chStart[id]=Date.now();
  recalc();rChal();
  notify('🔥 '+ch.nm,ch.desc);
}

// ════════════════════════════════════════
// CLICK HANDLER
// ════════════════════════════════════════
document.getElementById('clickZone').addEventListener('click', function(e){
  const pow=Cache.click;
  G.sig+=pow;G.tot+=pow;G.totAll+=pow;G.clicks++;

  const area=document.getElementById('towerWrap');
  const rect=area.getBoundingClientRect();
  const x=e.clientX-rect.left, y=e.clientY-rect.top;

  // Float number
  const f=document.createElement('div');
  f.className='float';
  f.textContent='+'+fmt(pow);
  f.style.cssText=`left:${x}px;top:${y-20}px;color:${pow>100?'var(--gold)':pow>10?'var(--acc3)':'var(--acc)'}`;
  area.appendChild(f);
  setTimeout(()=>f.remove(),900);

  // Burst particles
  const colors=['#00d4ff','#00ffaa','#ffd700','#ff4757'];
  for(let i=0;i<5;i++){
    const p=document.createElement('div');
    p.className='burst-p';
    const a=Math.random()*Math.PI*2, d=25+Math.random()*50;
    const sz=3+Math.random()*5;
    p.style.cssText=`left:${x}px;top:${y}px;width:${sz}px;height:${sz}px;background:${colors[i%colors.length]};--tx:${Math.cos(a)*d}px;--ty:${Math.sin(a)*d}px`;
    area.appendChild(p);
    setTimeout(()=>p.remove(),600);
  }

  // Pop sig counter
  const ce=document.getElementById('sCount');
  ce.classList.add('pop');
  setTimeout(()=>ce.classList.remove('pop'),100);
  upd();
});

// ════════════════════════════════════════
// GAME LOOP
// ════════════════════════════════════════
function tick(){
  const dt=(Date.now()-G.last)/1000;
  G.last=Date.now();
  const e=Cache.sps*dt;
  if(e>0){G.sig+=e;G.tot+=e;G.totAll+=e}

  // check challenges
  const now=Date.now(), cm=cMod();
  for(let ch of CH){
    const ts=G.chStart[ch.id];
    if(ts!==undefined && (now-ts)/1000>=ch.dur){
      G.chDone[ch.rw]=true;
      delete G.chStart[ch.id];
      notify('🎉 Испытание пройдено!',ch.rwD);
      recalc();
    }
  }

  // check achievements
  for(let a of ACH){
    if(!G.ach[a.id]&&a.ck()){
      G.ach[a.id]=true;
      notify('🏆 '+a.nm, a.desc);
    }
  }

  upd();
}

function autoTick(){
  if(G.autoB){
    const cm=cMod();
    let best=null,bv=0;
    for(let b of BLD){
      const cnt=bc(b.id);
      const cost=bCost(b,cnt)*(cm.costM||1);
      const sg=b.sps*(Cache.bMult[b.id]||1);
      const v=cost>0?sg/cost:0;
      if(v>bv&&G.sig>=cost){bv=v;best=b}
    }
    if(best){
      const cnt=bc(best.id);
      const amt=Math.min(G.buy,bMaxBuy(best,cnt));
      if(amt>0){
        const cost=Math.ceil(bBulkCost(best,cnt,amt)*(cMod().costM||1));
        if(G.sig>=cost){G.sig-=cost;G.bld[best.id]=(G.bld[best.id]||0)+amt;recalc();}
      }
    }
  }
  if(G.autoU){
    for(let u of UPG){
      if(!G.upg[u.id]&&u.req()&&G.sig>=u.cost){
        G.sig-=u.cost;G.upg[u.id]=true;
        notify('⚡ '+u.nm,u.desc);
        recalc();
      }
    }
  }
}

// ════════════════════════════════════════
// NOTIFY
// ════════════════════════════════════════
function notify(t,m){
  const n=document.createElement('div');
  n.className='notif';
  n.innerHTML=`<div class="nt">${t}</div><div class="nb">${m}</div>`;
  document.body.appendChild(n);
  setTimeout(()=>n.remove(),2900);
}

// ════════════════════════════════════════
// THEME
// ════════════════════════════════════════
function toggleTheme(){
  G.theme=G.theme==='dark'?'light':'dark';
  document.body.classList.toggle('light',G.theme==='light');
  save();
}

// ════════════════════════════════════════
// SAVE / LOAD
// ════════════════════════════════════════
function save(){
  G.last=Date.now();
  try{localStorage.setItem('rtrs_v3',JSON.stringify(G))}catch(e){}
}

function loadSave(){
  let raw;
  try{raw=localStorage.getItem('rtrs_v3')}catch(e){return}
  if(!raw) return;
  try{
    const d=JSON.parse(raw);
    const nums=['sig','tot','totAll','clicks','freq','harm','buy','sps'];
    const bools=['autoB','autoU'];
    const strs=['theme'];
    const objs=['bld','upg','ach','chDone','chStart'];
    for(let k of nums) if(typeof d[k]==='number') G[k]=d[k];
    for(let k of bools) if(typeof d[k]==='boolean') G[k]=d[k];
    for(let k of strs) if(typeof d[k]==='string') G[k]=d[k];
    for(let k of objs) if(d[k]&&typeof d[k]==='object') Object.assign(G[k],d[k]);
    if(G.theme==='light') document.body.classList.add('light');
    if(typeof d.start==='number') G.start=d.start;
    recalc();
    // offline income
    const off=(Date.now()-(d.last||Date.now()))/1000;
    if(off>10){
      const gain=Cache.sps*off*0.5;
      if(gain>0){
        G.sig+=gain;G.tot+=gain;G.totAll+=gain;
        setTimeout(()=>{
          showOfflineModal(gain,off);
        },600);
      }
    }
  }catch(e){console.error('Load error',e)}
}

function showOfflineModal(gain, secs){
  const ov=document.createElement('div');
  ov.className='off-ov';
  ov.innerHTML=`<div class="off-card">
    <h2>📡 Добро пожаловать!</h2>
    <p>Пока вас не было (<strong>${fmtT(secs*1000)}</strong>),<br>ваши антенны работали<br>и заработали</p>
    <div style="font-family:'Space Mono',monospace;font-size:1.8rem;color:var(--acc);margin:12px 0">${fmt(gain)}</div>
    <div style="font-size:.65rem;color:var(--txt3);margin-bottom:16px">сигналов (50% от полного дохода)</div>
    <button class="pbtn blu" onclick="this.closest('.off-ov').remove()">Принять</button>
  </div>`;
  document.body.appendChild(ov);
}

// ════════════════════════════════════════
// RENDER ALL
// ════════════════════════════════════════
function renderAll(){
  upd();rBuyRow();rBld();rUpg();rAch();rPre();rChal();rAuto();rStats();
}

// ════════════════════════════════════════
// TELEGRAM INTEGRATION
// ════════════════════════════════════════
try{
  const tg=window.Telegram&&window.Telegram.WebApp;
  if(tg){
    tg.expand();tg.ready();
    if(tg.colorScheme==='light'){G.theme='light';document.body.classList.add('light');}
    tg.MainButton.setText('💾 Сохранить прогресс');
    tg.MainButton.onClick(()=>{save();tg.showAlert('✅ Игра сохранена!')});
    tg.MainButton.show();
  }
}catch(e){}

// ════════════════════════════════════════
// INIT
// ════════════════════════════════════════
G.last=Date.now();
loadSave();
recalc();
renderAll();
setInterval(tick,50);
setInterval(render,1000);
setInterval(autoTick,1000);
setInterval(save,30000);
</script>
</body>
