<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>📡 RTRS Clicker</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════
   ДИЗАЙН — из ДИЗАЙН_ТУТ.html (полностью)
   ═══════════════════════════════════════ */
:root{
  --c0:#060d1a;--c1:#0a1628;--c2:#0e1f3d;--c3:#142852;--c4:#1a3366;
  --acc:#00d4ff;--acc2:#0099cc;--acc3:#00ffaa;
  --red:#ff4757;--gold:#ffd700;--gold2:#ffaa00;
  --txt:#e8f4fd;--txt2:#8ab4d4;--txt3:#4a7a9b;
  --border:rgba(0,180,255,0.12);--border2:rgba(0,180,255,0.25);
  --shadow:0 8px 32px rgba(0,0,0,0.6);
  --r:14px;--r2:10px;--r3:6px;
}
body.light{
  --c0:#f0f4f8;--c1:#e8eef5;--c2:#dde5ef;--c3:#d0dcea;--c4:#c2cfe0;
  --acc:#0077aa;--acc2:#005588;--acc3:#00994d;
  --red:#cc2233;--gold:#b8860b;--gold2:#9a7000;
  --txt:#1a2a3a;--txt2:#3a5a7a;--txt3:#6a8aaa;
  --border:rgba(0,100,180,0.15);--border2:rgba(0,100,180,0.3);
}
body.skin-neon{--acc:#ff00ff;--acc2:#cc00cc;--acc3:#00ffaa;--border:rgba(255,0,255,0.15);--border2:rgba(255,0,255,0.3)}
body.skin-gold{--acc:#ffd700;--acc2:#ccaa00;--acc3:#00ffaa;--border:rgba(255,215,0,0.15);--border2:rgba(255,215,0,0.3)}
body{font-family:'Space Grotesk',sans-serif;background:var(--c0);color:var(--txt);overflow-x:hidden;min-height:100vh;touch-action:manipulation;transition:background .3s,color .3s}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 40% at 20% 80%,rgba(0,100,200,0.07) 0%,transparent 60%),radial-gradient(ellipse 40% 60% at 80% 20%,rgba(0,180,255,0.04) 0%,transparent 60%);pointer-events:none;z-index:0}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
.hdr{position:sticky;top:0;z-index:200;background:rgba(10,22,40,0.94);backdrop-filter:blur(20px);border-bottom:1px solid var(--border2);padding:10px 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
body.light .hdr{background:rgba(240,244,248,0.94)}
.logo{font-family:'Space Mono',monospace;font-weight:700;font-size:1rem;color:var(--acc);letter-spacing:2px;text-transform:uppercase;text-shadow:0 0 20px rgba(0,212,255,0.4);flex-shrink:0;text-decoration:none;display:flex;align-items:center;gap:8px;cursor:pointer}
.logo:hover{opacity:.85}
.logo img{height:28px;width:auto;object-fit:contain}
.hstats{display:flex;gap:8px;flex:1;flex-wrap:wrap}
.hstat{display:flex;flex-direction:column;align-items:center;padding:5px 12px;background:rgba(0,180,255,0.06);border:1px solid var(--border);border-radius:var(--r3);min-width:65px;flex:1}
.hstat-l{font-size:.5rem;color:var(--txt3);text-transform:uppercase;letter-spacing:1.5px;font-weight:600}
.hstat-v{font-family:'Space Mono',monospace;font-size:.85rem;color:var(--txt);font-weight:700;margin-top:1px}
.hstat-v.blu{color:var(--acc)}.hstat-v.red{color:var(--red)}.hstat-v.gld{color:var(--gold)}
.thm{width:36px;height:36px;border-radius:50%;border:1px solid var(--border2);background:var(--c2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1rem;transition:all .2s;flex-shrink:0}
.thm:hover{background:var(--c3);transform:scale(1.1)}
.buffs{display:flex;gap:6px;padding:6px 16px;overflow-x:auto;background:rgba(0,0,0,0.15);border-bottom:1px solid var(--border);min-height:0}
.buff{padding:3px 10px;background:var(--c2);border:1px solid var(--border);border-radius:20px;font-size:.55rem;font-weight:700;white-space:nowrap;display:flex;align-items:center;gap:4px;animation:buffIn .3s cubic-bezier(.34,1.56,.64,1)}
@keyframes buffIn{from{transform:translateY(-10px);opacity:0}to{transform:translateY(0);opacity:1}}
.wrap{display:grid;grid-template-columns:1fr 380px;min-height:calc(100vh - 56px - 36px);position:relative;z-index:1}
.cpanel{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 20px;gap:16px;position:relative;overflow:hidden}
.sig-box{text-align:center}
.sig-n{font-family:'Space Mono',monospace;font-size:3rem;font-weight:700;color:var(--txt);line-height:1;text-shadow:0 0 40px rgba(0,212,255,0.25);transition:transform .08s}
.sig-n.pop{transform:scale(1.05) translateY(-2px)}
.combo-display{font-size:.7rem;color:var(--acc3);font-weight:700;min-height:16px;margin-top:2px;transition:opacity .3s}
.combo-display.hot{color:var(--red);animation:pulse .5s infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
.sig-lbl{font-size:.85rem;color:var(--acc);font-weight:500;margin-top:5px;letter-spacing:1px}
.sig-sps{font-family:'Space Mono',monospace;font-size:.72rem;color:var(--txt3);margin-top:4px}
.prestige-countdown{font-size:.6rem;color:var(--gold);margin-top:4px;opacity:0;transition:opacity .3s}
.prestige-countdown.show{opacity:1}
.ch-bar{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;min-height:0}
.ch-tag{padding:4px 12px;background:rgba(255,71,87,0.12);border:1px solid rgba(255,71,87,0.4);border-radius:20px;font-size:.58rem;color:var(--red);font-weight:700;letter-spacing:.5px;animation:tagP 2s ease-in-out infinite}
@keyframes tagP{0%,100%{border-color:rgba(255,71,87,0.4)}50%{border-color:rgba(255,71,87,.8)}}
.tower-outer{position:relative;cursor:pointer;user-select:none}
.tower-outer:active .tower-canvas{transform:scale(.97)}
.tower-canvas{transition:transform .1s cubic-bezier(.34,1.56,.64,1);display:block;max-width:100%;height:auto;width:100%}
.t-click-zone{position:absolute;inset:0;border-radius:var(--r2)}
.ring{position:absolute;left:50%;top:42%;width:130px;height:130px;border-radius:50%;border:1.5px solid rgba(0,212,255,0.35);pointer-events:none;transform:translate(-50%,-50%);animation:ringP 2.5s ease-out infinite}
.ring2{animation-delay:.9s;border-color:rgba(0,212,255,0.15);width:180px;height:180px}
@keyframes ringP{0%{transform:translate(-50%,-50%) scale(.8);opacity:.8}100%{transform:translate(-50%,-50%) scale(1.6);opacity:0}}
.stage-b{font-family:'Space Mono',monospace;font-size:.58rem;color:var(--acc);letter-spacing:2px;text-transform:uppercase;padding:5px 16px;border:1px solid var(--border2);border-radius:20px;background:rgba(0,180,255,0.05)}
.clk-pw{font-size:.75rem;color:var(--txt3);font-weight:500}
.clk-pw span{color:var(--acc);font-family:'Space Mono',monospace;font-weight:700}
.float{position:absolute;font-family:'Space Mono',monospace;font-weight:700;pointer-events:none;white-space:nowrap;z-index:50;font-size:1rem;animation:floatUp .9s cubic-bezier(.2,.8,.2,1) forwards}
@keyframes floatUp{0%{transform:translateY(0) scale(.7);opacity:0}15%{transform:translateY(-8px) scale(1.1);opacity:1}100%{transform:translateY(-70px) scale(.85);opacity:0}}
.burst-p{position:absolute;border-radius:50%;pointer-events:none;z-index:50;animation:burstOut .6s cubic-bezier(.15,.8,.3,1) forwards}
@keyframes burstOut{0%{transform:translate(0,0) scale(1.5);opacity:1}100%{transform:translate(var(--tx),var(--ty)) scale(0);opacity:0}}
.shop{background:var(--c1);border-left:1px solid var(--border);display:flex;flex-direction:column;max-height:calc(100vh - 56px - 36px);overflow:hidden}
.shop-tabs{display:grid;grid-template-columns:repeat(4,1fr);padding:10px;gap:4px;background:var(--c1);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10;flex-shrink:0}
.stab{display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 4px;border:none;background:var(--c2);border-radius:var(--r3);cursor:pointer;font-family:'Space Grotesk',sans-serif;color:var(--txt3);transition:all .2s}
.stab:hover{background:var(--c3);color:var(--txt2)}
.stab.active{background:rgba(0,180,255,0.1);color:var(--acc);box-shadow:inset 0 -2px 0 var(--acc)}
.stab-em{font-size:1.25rem;line-height:1}.stab-tx{font-size:.5rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.shop-body{flex:1;overflow-y:auto;padding:14px;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.tcont{display:none}.tcont.active{display:block}
.buy-row{display:flex;gap:6px;margin-bottom:12px}
.bbtn{flex:1;padding:7px;border:1px solid var(--border);background:var(--c2);color:var(--txt3);border-radius:var(--r3);cursor:pointer;font-family:'Space Grotesk',sans-serif;font-size:.7rem;font-weight:700;transition:all .2s}
.bbtn:hover{background:var(--c3)}.bbtn.active{border-color:var(--acc);color:var(--acc);background:rgba(0,180,255,0.08)}
.bbtn.max{background:var(--c3);border-color:var(--gold);color:var(--gold)}
.card{background:var(--c2);border:1px solid var(--border);border-radius:var(--r2);padding:11px;margin-bottom:8px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.card:hover{background:var(--c3);border-color:var(--border2);transform:translateY(-1px)}
.card.aff{border-color:rgba(0,212,255,0.3)}
.card.lock{opacity:.3;pointer-events:none}
.card.done{opacity:.4;pointer-events:none;background:var(--c1)}
.card.pop-anim{animation:cardPop .3s cubic-bezier(.34,1.56,.64,1)}
@keyframes cardPop{0%{transform:scale(.95)}50%{transform:scale(1.03) translateY(-2px)}100%{transform:scale(1) translateY(0)}}
.cicon{width:40px;height:40px;background:var(--c3);border-radius:var(--r3);display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0;border:1px solid var(--border)}
.ci{flex:1;min-width:0}
.cn{font-size:.73rem;font-weight:700;color:var(--txt);margin-bottom:2px}
.cd{font-size:.6rem;color:var(--txt3);margin-bottom:3px;line-height:1.3}
.cs{font-size:.6rem;color:var(--acc);font-weight:600}
.cr{text-align:right;flex-shrink:0}
.cc{font-family:'Space Mono',monospace;font-size:.72rem;font-weight:700}
.cc.no{color:var(--red)}.cc.ok{color:var(--acc3)}.cc.some{color:var(--gold2)}
.cct{font-size:.57rem;color:var(--txt3);margin-top:2px;font-weight:600}
.slbl{font-size:.55rem;color:var(--txt3);text-transform:uppercase;letter-spacing:2px;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border);font-weight:700}
.ucost{font-family:'Space Mono',monospace;font-size:.72rem;font-weight:700;color:var(--txt)}
.ucost.no{color:var(--red)}.ucost.ok{color:var(--acc3)}
.achcard.unl{border-color:rgba(255,215,0,0.4);background:rgba(255,215,0,0.03)}
.achi{width:38px;height:38px;border-radius:var(--r3);display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;background:var(--c3);border:1px solid var(--border)}
.achcard.unl .achi{border-color:rgba(255,215,0,0.5)}
.achn{font-size:.65rem;font-weight:700;color:var(--gold);margin-bottom:2px}
.pbar{height:6px;background:var(--c1);border-radius:3px;overflow:hidden;margin-top:6px;border:1px solid var(--border)}
.pfill{height:100%;background:linear-gradient(90deg,var(--red),#ff6b7a);border-radius:3px;transition:width .4s ease}
.pfill.done{background:linear-gradient(90deg,var(--acc),var(--acc3))}
.ptxt{font-size:.58rem;color:var(--txt3);margin-top:5px;font-weight:600}
.psec{text-align:center;padding:18px 14px;margin-bottom:12px;background:var(--c2);border:1px solid var(--border);border-radius:var(--r2);position:relative}
.psec h3{font-family:'Space Mono',monospace;font-size:.95rem;margin-bottom:8px;color:var(--txt);font-weight:700}
.psec p{font-size:.68rem;color:var(--txt3);margin-bottom:10px;line-height:1.5}
.pbtn{font-family:'Space Grotesk',sans-serif;font-size:.72rem;font-weight:700;padding:9px 22px;border:1px solid;border-radius:var(--r3);cursor:pointer;transition:all .2s;text-transform:uppercase;letter-spacing:1px;background:var(--c3);margin:6px 0;display:inline-block}
.pbtn.red{border-color:var(--red);color:var(--red)}.pbtn.red:not([disabled]):hover{background:var(--red);color:#fff}
.pbtn.blu{border-color:var(--acc);color:var(--acc)}.pbtn.blu:not([disabled]):hover{background:var(--acc);color:var(--c0)}
.pbtn[disabled]{opacity:.25;cursor:not-allowed;background:var(--c2)!important;color:var(--txt3)!important;border-color:var(--border)!important}
.chcard{background:var(--c2);border:1px solid var(--border);border-radius:var(--r2);padding:11px;margin-bottom:8px;cursor:pointer;transition:all .2s}
.chcard:hover:not(.done):not(.failed){border-color:var(--border2);transform:translateY(-1px)}
.chcard.active{border-color:rgba(255,71,87,0.5);background:rgba(255,71,87,0.04)}
.chcard.done{opacity:.5;pointer-events:none}
.chcard.failed{border-color:rgba(255,71,87,0.2);background:rgba(255,71,87,0.02);opacity:.7}
.chn{font-size:.72rem;font-weight:700;color:var(--txt);margin-bottom:3px}
.chd{font-size:.62rem;color:var(--txt3);margin-bottom:4px;line-height:1.4}
.chr{font-size:.6rem;color:var(--acc);font-weight:600}
.arow{display:flex;align-items:center;justify-content:space-between;padding:11px;margin-bottom:8px;background:var(--c2);border:1px solid var(--border);border-radius:var(--r2)}
.albl{font-size:.7rem;color:var(--txt);font-weight:600}.adsc{font-size:.6rem;color:var(--txt3);margin-top:2px}
.tgl{width:44px;height:24px;border-radius:12px;background:var(--c3);border:1px solid var(--border);cursor:pointer;position:relative;transition:all .25s;flex-shrink:0}
.tgl.on{background:var(--acc2);border-color:var(--acc)}
.tgl::after{content:'';position:absolute;width:18px;height:18px;border-radius:50%;background:var(--txt);top:2px;left:2px;transition:transform .25s;box-shadow:0 2px 4px rgba(0,0,0,.4)}
.tgl.on::after{transform:translateX(20px)}
.srow{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border);font-size:.73rem}
.slb{color:var(--txt3);font-weight:500}.sv{font-family:'Space Mono',monospace;font-size:.68rem;color:var(--acc);font-weight:700}
.notif{position:fixed;top:66px;right:14px;z-index:1000;max-width:280px;background:var(--c3);border:1px solid var(--border2);border-radius:var(--r2);padding:11px 14px;box-shadow:var(--shadow);animation:nIn .3s cubic-bezier(.34,1.56,.64,1),nOut .4s ease-in 2.4s forwards;pointer-events:none}
@keyframes nIn{from{transform:translateX(120%) scale(.9);opacity:0}to{transform:translateX(0) scale(1);opacity:1}}
@keyframes nOut{from{transform:translateX(0);opacity:1}to{transform:translateX(120%);opacity:0}}
.nt{font-family:'Space Mono',monospace;font-size:.68rem;color:var(--txt);margin-bottom:3px;font-weight:700}
.nb{font-size:.62rem;color:var(--acc);line-height:1.4}
.event-banner{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.9);z-index:1500;background:var(--c2);border:2px solid var(--gold);border-radius:var(--r);padding:24px;text-align:center;max-width:320px;width:90%;box-shadow:0 0 40px rgba(255,215,0,0.3);animation:eventPop .4s cubic-bezier(.34,1.56,.64,1) forwards}
@keyframes eventPop{to{transform:translate(-50%,-50%) scale(1)}}
.event-banner h3{color:var(--gold);margin-bottom:8px;font-family:'Space Mono',monospace}
.event-banner p{color:var(--txt2);font-size:.75rem;margin-bottom:14px}
.off-ov{position:fixed;inset:0;z-index:2000;background:rgba(6,13,26,0.95);backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:center}
.off-card{background:var(--c2);border:1px solid var(--border2);border-radius:var(--r);padding:32px;text-align:center;max-width:320px}
.off-card h2{font-family:'Space Mono',monospace;color:var(--acc);margin-bottom:12px;font-size:1.1rem}
.off-card p{color:var(--txt2);font-size:.8rem;line-height:1.6;margin-bottom:12px}
.tut-ov{position:fixed;inset:0;z-index:4000;background:rgba(0,0,0,0.75);pointer-events:auto;cursor:pointer;display:none}
.tut-card{position:absolute;background:var(--c2);border:1px solid var(--acc);border-radius:var(--r);padding:16px;max-width:260px;width:90%;pointer-events:auto;box-shadow:0 0 30px rgba(0,212,255,0.4);z-index:4001}
.tut-close{background:none;border:none;color:var(--txt3);font-size:1.2rem;cursor:pointer;padding:4px}
.tut-close:hover{color:var(--txt)}
.tut-skip{background:none;border:1px solid var(--border);color:var(--txt3);padding:6px 12px;border-radius:var(--r3);cursor:pointer;font-size:.65rem;font-weight:700}
.tut-skip:hover{background:var(--c3);color:var(--txt)}
.tut-btn{padding:8px 16px;background:var(--acc);color:var(--c0);border:none;border-radius:var(--r3);cursor:pointer;font-weight:700;font-size:.7rem}
.tut-btn:hover{opacity:.9}
.daily-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.d-item{background:var(--c2);border:1px solid var(--border);border-radius:var(--r3);padding:10px;text-align:center;position:relative;opacity:.6;cursor:pointer}
.d-item.done{border-color:var(--acc3);opacity:1;background:rgba(0,255,170,0.05)}
.d-item.today{border-color:var(--gold);opacity:1;background:rgba(255,215,0,0.05)}
.d-day{font-size:.6rem;color:var(--txt3);margin-bottom:4px}
.d-rw{font-size:1.1rem;margin-bottom:4px}
.d-claim{font-size:.6rem;color:var(--acc3);font-weight:700}
.d-item.done .d-claim{color:var(--txt3)}
.d-item.today .d-claim{color:var(--gold)}
.set-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border)}
.set-lbl{font-size:.75rem;color:var(--txt)}
.set-desc{font-size:.6rem;color:var(--txt3);margin-top:2px}
.skin-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.skin-card{background:var(--c2);border:1px solid var(--border);border-radius:var(--r3);padding:10px;text-align:center;cursor:pointer;transition:all .2s}
.skin-card:hover{transform:translateY(-2px);border-color:var(--border2)}
.skin-card.active{border-color:var(--acc);background:rgba(0,180,255,0.08)}
.skin-card.lock{opacity:.4;cursor:not-allowed}
.skin-name{font-size:.7rem;font-weight:700;margin-bottom:4px}
.skin-req{font-size:.55rem;color:var(--txt3)}
.skin-preview{width:40px;height:40px;border-radius:50%;margin:0 auto 6px;border:2px solid transparent}
.res-card{background:var(--c2);border:1px solid var(--border);border-radius:var(--r2);padding:12px;margin-bottom:10px;display:flex;align-items:center;gap:12px}
.res-card.done{opacity:.5}
.res-card.lock{opacity:.3;pointer-events:none}
.res-icon{width:44px;height:44px;background:var(--c3);border-radius:var(--r3);display:flex;align-items:center;justify-content:center;font-size:1.4rem;border:1px solid var(--border)}
.res-info{flex:1}
.res-name{font-size:.75rem;font-weight:700;margin-bottom:3px}
.res-desc{font-size:.6rem;color:var(--txt3);margin-bottom:4px}
.res-cost{font-family:'Space Mono',monospace;font-size:.65rem}
.res-btn{padding:6px 12px;border:1px solid var(--border);background:var(--c3);color:var(--txt3);border-radius:var(--r3);cursor:pointer;font-size:.65rem;font-weight:700;transition:all .2s}
.res-btn:hover:not([disabled]){background:var(--acc);color:var(--c0);border-color:var(--acc)}
.res-btn[disabled]{opacity:.3;cursor:not-allowed}
@media(max-width:850px){.wrap{grid-template-columns:1fr;grid-template-rows:auto 1fr}.shop{max-height:none;border-left:none;border-top:1px solid var(--border)}.sig-n{font-size:2.4rem}.cpanel{min-height:45vh;padding:18px 14px;gap:14px}.hdr{gap:8px}.shop-tabs{grid-template-columns:repeat(4,1fr)}}
</style>
</head>
<body>

<!-- HEADER -->
<div class="hdr">
  <a class="logo" href="https://rtrs.ru" target="_blank" rel="noopener">
    <img id="logoImg" src="" alt="RTRS" onerror="this.style.display='none';document.getElementById('logoTxt').style.display='block'">
    <span id="logoTxt" style="display:none">📡 RTRS</span>
  </a>

function gStage(){if(G.totAll>=5e12)return 4;if(G.totAll>=5e9)return 3;if(G.totAll>=5e6)return 2;if(G.totAll>=5e4)return 1;return 0}
function bc(id){return G.bld[id]||0}
function tB(){return Object.values(G.bld).reduce((a,b)=>a+b,0)}
function fmt(n){if(n==null||isNaN(n)||!isFinite(n))return'0';n=Math.max(0,n);if(n<10)return parseFloat(n.toFixed(1)).toString();if(n<1e4)return Math.floor(n).toLocaleString('ru');if(n<1e6)return(n/1e3).toFixed(1)+'K';if(n<1e9)return(n/1e6).toFixed(2)+'M';if(n<1e12)return(n/1e9).toFixed(2)+'B';if(n<1e15)return(n/1e12).toFixed(2)+'T';return n.toExponential(2)}
function fmtT(ms){let s=Math.floor(ms/1e3),m=Math.floor(s/60);s%=60;let h=Math.floor(m/60);m%=60;let d=Math.floor(h/24);h%=24;if(d>0)return d+'д '+h+'ч';if(h>0)return h+'ч '+m+'м';if(m>0)return m+'м '+s+'с';return s+'с'}
function getResVal(id){const r=RES.find(x=>x.id===id);return r&&G.res[id]?r.val:1}
function getGlobalMult(){const f=G.upg['p1']?1.5:1;const h=G.upg['p2']?1.5:1;return(1+(G.freq*0.02*f))*(1+(G.harm*0.10*h))}

// ══════════════════════════════════════════════════════
// РАСЧЁТ — защищённый из РАБОТАЮЩИЙ_КОД + логика ДИЗАЙН
// ══════════════════════════════════════════════════════
function recalc(){
  try{
    const cm=cMod();
    // Click
    let cp=1;
    for(const u of UPG)if(G.upg[u.id]&&u.tp==='clk')cp*=u.m;
    cp*=cm.clkM*getBoostMult('clk')*getResVal('r1')
       *(G.chDone.pc1?1.08:1)*(G.chDone.pc5?1.25:1)*(G.chDone.pc7?1.5:1)
       *getGlobalMult();
    Cache.click=Math.max(1,isFinite(cp)?cp:1);
    // SPS
    let glb=1;
    for(const u of UPG)if(G.upg[u.id]&&u.tp==='glb')glb*=u.m;
    glb*=cm.prodM*getResVal('r3')*getGlobalMult();
    const now=Date.now();
    if(G.boosters.e1&&G.boosters.e1.dur&&now-G.boosters.e1.ts<G.boosters.e1.dur*1000)glb*=3;
    if(G.boosters.e3&&G.boosters.e3.dur&&now-G.boosters.e3.ts<G.boosters.e3.dur*1000)glb*=0.5;
    // Rewards from challenges
    if(G.chDone.pc2)glb*=1.12;
    if(G.chDone.pc4)glb*=1.20;
    if(G.chDone.pc6)glb*=1.30;
    // Buildings
    let tsps=0;Cache.bMult={};
    for(const b of BLD){
      let bm=glb;
      for(const u of UPG)if(G.upg[u.id]&&u.tp==='bld'&&u.b===b.id)bm*=u.m;
      Cache.bMult[b.id]=isFinite(bm)?bm:1;
      const cnt=G.bld[b.id]||0;
      if(cnt>0){const v=b.sps*bm*cnt;if(isFinite(v))tsps+=v}
    }
    Cache.sps=tsps*cm.spsM;
    G.sps=isFinite(Cache.sps)?Cache.sps:0;
  }catch(e){console.error('recalc err',e);Cache.click=1;Cache.sps=0;G.sps=0}
}

function cMod(){
  let m={spsM:1,clkM:1,prodM:1,costM:1};
  for(const ch of CH){const cs=G.chStart[ch.id];if(cs)for(const k in ch.mod)m[k]*=ch.mod[k]}
  return m;
}

// Защищённая очистка бустов из РАБОТАЮЩИЙ_КОД
function getBoostMult(type,base=1){
  const now=Date.now();let mult=base;
  const toDel=[];
  for(const b in G.boosters){
    const boost=G.boosters[b];
    if(boost.dur&&now-boost.ts<boost.dur*1000){
      if((b==='e1'&&type==='sps')||(b==='e4'&&type==='clk'))mult*=2;
      if(b==='e3'&&type==='clk')mult*=1.5;
    }else{toDel.push(b)}
  }
  toDel.forEach(b=>delete G.boosters[b]);
  return mult;
}

function initAudio(){
  if(audioCtx||!G.settings.sound)return;
  try{audioCtx=new(window.AudioContext||window.webkitAudioContext)();audioStarted=true}catch(e){}
}
function playClick(){
  if(!G.settings.sound||!audioCtx)return;
  const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.type='sine';o.frequency.setValueAtTime(400,audioCtx.currentTime);
  o.frequency.exponentialRampToValueAtTime(800,audioCtx.currentTime+0.1);
  g.gain.setValueAtTime(0.15,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.15);
  o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+0.15);
}

// МАГАЗИН — BUY ROW
// ══════════════════════════════════════════════════════
function rBuyRow(){
  document.getElementById('buyRow').innerHTML=
    `<button class="bbtn${G.buy===1?' active':''}" onclick="setBuy(1)">×1</button>
     <button class="bbtn${G.buy===10?' active':''}" onclick="setBuy(10)">×10</button>
     <button class="bbtn${G.buy===100?' active':''}" onclick="setBuy(100)">×100</button>
     <button class="bbtn max" onclick="buyMax()">МАКС</button>`;
}
function setBuy(n){G.buy=n;rBuyRow();rBld()}
function buyMax(){G.buy=999;rBuyRow();rBld()}

// Цена с учётом исследования r2 + скидки за испытание pc3 (из ДИЗАЙН)
function bCost(b,n){const disc=G.chDone.pc3?0.85:1;return Math.ceil(b.cost*Math.pow(b.cm,n)*disc*getResVal('r2'))}
function bBulkCost(b,n,amt){let t=0;for(let i=0;i<amt;i++)t+=bCost(b,n+i);return t}

// Защита от бесконечного цикла — счётчик итераций из РАБОТАЮЩИЙ_КОД
function bMaxBuy(b,n){
  const cm=cMod();let a=0,t=0;
  const lim=Math.min(G.buy===999?999:G.buy,999);
  let iter=0;
  while(a<lim&&iter<1000){
    iter++;
    const c=bCost(b,n+a)*(cm.costM||1);
    if(!isFinite(c)||c<=0||t+c>G.sig)break;
    t+=c;a++;
  }
  return a;
}

// ══════════════════════════════════════════════════════
// РЕНДЕР ЗДАНИЙ — цвет зелёный/жёлтый/красный
// ══════════════════════════════════════════════════════
function rBld(){
  const cm=cMod();let h='';
  for(const b of BLD){
    const cnt=bc(b.id),canBuy=bMaxBuy(b,cnt),wantBuy=G.buy===999?999:G.buy;
    const actualAmt=G.buy===999?(canBuy>0?canBuy:1):wantBuy;
    const sc=bCost(b,cnt);
    const bcost=bBulkCost(b,cnt,actualAmt)*(cm.costM||1);
    const ac=canBuy>0?bBulkCost(b,cnt,canBuy)*(cm.costM||1):bcost;
    const sps=b.sps*(Cache.bMult[b.id]||1),tot=sps*cnt;
    // GREEN = хватает на полное wantBuy; YELLOW = хватает хоть на 1; RED = нет
    const f=G.sig>=Math.ceil(bcost),s=G.sig>=Math.ceil(sc*(cm.costM||1));
    let cc;if(f)cc='cc ok';else if(s)cc='cc some';else cc='cc no';
    const aff=s,show=canBuy>1&&wantBuy<999;
    const disp=f?fmt(Math.ceil(bcost)):s?fmt(Math.ceil(ac)):fmt(Math.ceil(bcost));
    h+=`<div class="card${aff?' aff':''}" data-bid="${b.id}" onclick="buyB('${b.id}')"><div class="cicon">${b.ic}</div><div class="ci"><div class="cn">${b.name}</div><div class="cd">${b.desc}</div><div class="cs">+${fmt(sps)}/с · всего ${fmt(tot)}</div></div><div class="cr"><div class="${cc}">${disp}</div><div class="cct">${cnt}${show?' (×'+canBuy+')':''}</div></div></div>`;
  }
  document.getElementById('bList').innerHTML=h;
}
function buyB(id){
  const b=BLD.find(x=>x.id===id);if(!b)return;
  const cnt=bc(id),amt=G.buy===999?Math.min(999,bMaxBuy(b,cnt)):bMaxBuy(b,cnt);
  if(amt<=0)return;
  const dc=Math.ceil(bBulkCost(b,cnt,amt)*(cMod().costM||1));
  if(G.sig<dc)return;
  G.sig-=dc;G.bld[id]=(G.bld[id]||0)+amt;
  recalc();rBld();rUpg();rRes();animateCard(id);
}

function rUpg(){
  const avail=[],done=[];
  for(const u of UPG){
    if(G.upg[u.id]){done.push(u);continue}
    if(!u.req())continue;
    const aff=G.sig>=u.cost;
    avail.push(`<div class="card ucard${aff?' aff':''}" onclick="buyU('${u.id}')"><div class="cicon">${u.ic}</div><div class="ci"><div class="cn">${u.nm}</div><div class="cd">${u.desc}</div></div><div class="cr"><div class="ucost${aff?' ok':' no'}">${fmt(u.cost)}</div></div></div>`);
  }
  let h=avail.length?avail.join(''):`<div style="text-align:center;color:var(--txt3);padding:24px;font-size:.75rem;background:var(--c2);border-radius:var(--r2);border:1px solid var(--border)">Нет доступных улучшений</div>`;
  if(done.length){h+=`<div class="slbl" style="margin-top:14px">Куплено (${done.length}/${UPG.length})</div>`;h+=done.map(u=>`<div class="card done"><div class="cicon">${u.ic}</div><div class="ci"><div class="cn">${u.nm} ✓</div><div class="cd">${u.desc}</div></div></div>`).join('')}
  document.getElementById('uList').innerHTML=h;
}
function buyU(id){
  const u=UPG.find(x=>x.id===id);if(!u||G.upg[id]||G.sig<u.cost||!u.req())return;
  G.sig-=u.cost;G.upg[id]=true;recalc();rUpg();rBld();rRes();notify('⚡ '+u.nm,u.desc);
}

function rRes(){
  let h='<div class="slbl">Дерево исследований</div>';
  const avail=[],done=[];
  for(const r of RES){
    if(G.res[r.id]){done.push(r);continue}

    const aff=G.sig>=r.cost;
    avail.push(`<div class="res-card"><div class="res-icon">${r.ic}</div><div class="res-info"><div class="res-name">${r.nm}</div><div class="res-desc">${r.desc}</div><div class="res-cost">💰 ${fmt(r.cost)}</div></div><button class="res-btn"${aff?'':' disabled'} onclick="buyRes('${r.id}')">Изучить</button></div>`);
  }
  h+=avail.length?avail.join(''):`<div style="color:var(--txt3);text-align:center;padding:12px;font-size:.7rem">Исследований пока нет</div>`;
  if(done.length){h+=`<div class="slbl" style="margin-top:14px">Изучено (${done.length}/${RES.length})</div>`;h+=done.map(r=>`<div class="res-card done"><div class="res-icon">${r.ic}</div><div class="res-info"><div class="res-name">${r.nm} ✓</div><div class="res-desc">${r.desc}</div></div></div>`).join('')}
  document.getElementById('rList').innerHTML=h;
}

  const r=RES.find(x=>x.id===id);if(!r||G.res[id]||G.sig<r.cost||!r.req())return;
  G.sig-=r.cost;G.res[id]=true;recalc();rRes();notify('🔬 '+r.nm,r.desc);
}

function rChal(){

    }
    h+=`<br>`;
  }
  h+=`<div class="slbl">Испытания</div>`;
  for(const ch of CH){
    const act=G.chStart[ch.id]!==undefined,done=G.chDone[ch.rw],fail=G.chFailed[ch.id]||0,can=!act&&!done&&ch.req();
    h+=`<div class="chcard${done?' done':act?' active':''}" ${can?`onclick="startCh('${ch.id}')"`:''}><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:3px"><div class="chn">${ch.nm}${act?' 🔥':''}${done?' ✓':''}</div><span style="font-size:.55rem;font-weight:700;color:${ch.dCol};padding:2px 8px;border:1px solid ${ch.dCol};border-radius:10px;opacity:.85;flex-shrink:0;margin-left:6px">${ch.diff}</span></div><div class="chd">${ch.desc}</div><div class="chr">${done?'🎁 ':'Награда: '}${ch.rwD}</div>${fail>0&&!done?`<div style="font-size:.55rem;color:var(--red);margin-top:3px">❌ Провалено: ${fail} раз</div>`:''}${!done&&!act?`<div style="font-size:.55rem;color:var(--txt3);margin-top:3px">Цель: ${fmt(ch.goal)} сигналов · ${ch.dur}с</div>`:''}${can?`<div style="font-size:.6rem;color:var(--acc3);margin-top:5px;font-weight:600">▶ Нажмите для старта</div>`:''}</div>`;
  }
  document.getElementById('cList').innerHTML=h;
}
function startCh(id){
  const ch=CH.find(x=>x.id===id);
  if(!ch||G.chStart[id]!==undefined||G.chDone[ch.rw]||!ch.req())return;
  showConfirm('🔥 '+ch.nm,`${ch.desc}\nЦель: накопить ${fmt(ch.goal)} за ${ch.dur}с\nНаграда: ${ch.rwD}`,()=>{
    G.chStart[id]={ts:Date.now(),startSig:G.tot};recalc();rChal();notify('🔥 '+ch.nm,ch.desc);
  });
}

function pGain(){let g=G.totAll<5e6?0:Math.floor(Math.pow(G.totAll/5e6,0.5));g*=getResVal('r6');return Math.floor(g)}
function hGain(){return G.totAll<1e9?0:Math.floor(Math.pow(G.totAll/1e9,0.5))}
function rPre(){
  const fg=pGain(),hg=hGain(),cur=getGlobalMult();

  h+=`<div class="psec"><h3>🔵 Великий сброс</h3><p>Сброс ВСЕГО → гармоники<br><span style="font-size:.62rem;opacity:.7">Каждая гармоника: +10% (мультипликативно)</span></p><div style="font-size:.7rem;color:var(--txt3);margin-bottom:4px">Получите: <span style="color:var(--acc);font-family:'Space Mono',monospace;font-size:.9rem;font-weight:700">+${fmt(hg)}</span></div><div style="font-size:.6rem;color:var(--txt3);margin-bottom:12px">Уже есть: ${G.harm} гармоник</div><button class="pbtn blu" ${hg<=0?'disabled':''} onclick="doHarm()">🌌 Великий сброс</button></div>`;
  h+=`<div class="psec" style="border-color:var(--gold)"><h3>🌐 Синергия</h3><p>Текущий множитель: <span style="color:var(--acc3);font-weight:700">×${cur.toFixed(2)}</span></p></div>`;
  document.getElementById('pList').innerHTML=h;
}
function doPre(){
  const g=pGain();if(g<=0)return;

}

    G.harm+=g;G.freq=0;G.sig=0;G.tot=0;G.totAll=0;G.bld={};G.upg={};G.res={};G.chDone={};G.chFailed={};G.chStart={};G.boosters={};G.events=[];
    recalc();renderAll();notify('🔵 Гармоники','+'+g+' гармоник');save();
  });
}

// ЕЖЕДНЕВНЫЕ НАГРАДЫ — исправленный счётчик дней
// ══════════════════════════════════════════════════════
function checkDaily(){
  const now=Date.now(),day=Math.floor(now/864e5);
  if(G.daily.last!==day){
    G.daily.streak=G.daily.last===day-1?G.daily.streak:0;
    G.daily.collected={};rDaily();
  }else if(G.daily.streak===0)G.daily.streak=1;
}
function rDaily(){
  const now=Date.now(),day=Math.floor(now/864e5),streak=G.daily.streak;
  const currentDayOfCycle=streak===0?1:((streak-1)%7+1);
  let h=`<div class="slbl">Ежедневные награды</div><div style="text-align:center;margin-bottom:12px">🔥 Серия: ${streak} дней</div><div class="daily-grid" id="dailyGrid">`;
  for(let d=1;d<=7;d++){
    const c=G.daily.collected[d],isT=d===currentDayOfCycle&&!G.daily.collected[d]&&G.daily.last!==day;
    h+=`<div class="d-item${c?' done':isT?' today':''}" data-day="${d}"><div class="d-day">День ${d}</div><div class="d-rw">${d===1?'📻':d===3?'⚡':d===7?'🌟':'💎'}</div><div class="d-claim">${c?'Получено':isT?'Забрать':'🔒'}</div></div>`;
  }
  h+=`</div>`;
  document.getElementById('dList').innerHTML=h;
  document.getElementById('dailyGrid')?.addEventListener('click',function(e){
    const item=e.target.closest('.d-item');
    if(item&&item.classList.contains('today'))claimDaily(parseInt(item.dataset.day));
  },{once:true});
}
function claimDaily(day){
  const now=Date.now(),dayIdx=Math.floor(now/864e5),expected=(G.daily.streak%7)+1;
  if(day!==expected)return;
  G.daily.collected[day]=true;G.daily.last=dayIdx;G.daily.streak++;
  const rewards=[{sig:1e4},{sp:2},{clk:1},{bld:5},{sig:1e5},{sp:3},{harm:1}];
  const rw=rewards[day-1];
  if(rw.sig){G.sig+=rw.sig;G.tot+=rw.sig;G.totAll+=rw.sig}
  if(rw.sp)G.boosters.e1={ts:now,dur:rw.sp*3600};
  if(rw.clk)G.boosters.e4={ts:now,dur:1800};
  if(rw.harm)G.harm+=rw.harm;
  if(rw.bld){const b=BLD[Math.floor(Math.random()*3)];G.bld[b.id]=(G.bld[b.id]||0)+rw.bld}
  recalc();rDaily();notify('📅 День '+day+' получен!','Бонус активирован');
}

function applySkin(){document.body.className=document.body.className.replace(/skin-\w+/g,'').trim();if(G.currentSkin!=='default')document.body.classList.add('skin-'+G.currentSkin);drawTower(gStage())}

function rAuto(){

function renderBuffs(){
  const now=Date.now(),tags=[];
  for(const b in G.boosters){
    if(!G.boosters[b].dur||now-G.boosters[b].ts>G.boosters[b].dur*1000){delete G.boosters[b];continue}
    const ev=EVENTS.find(e=>e.id===b);
    if(ev)tags.push(`<div class="buff" style="border-color:var(--gold);color:var(--gold)">✨ ${ev.nm} ${Math.ceil((G.boosters[b].dur-(now-G.boosters[b].ts)/1000))}с</div>`);
  }
  for(const ch of CH){const cs=G.chStart[ch.id];if(cs)tags.push(`<div class="buff" style="border-color:var(--red);color:var(--red)">🔥 ${ch.nm} ${Math.ceil((ch.dur-(now-cs.ts)/1000))}с</div>`)}
  document.getElementById('buffsBar').innerHTML=tags.join('');
}

function upd(){
  document.getElementById('sCount').textContent=fmt(G.sig);
  document.getElementById('hSig').textContent=fmt(G.sig);
  document.getElementById('hSps').textContent=fmt(Cache.sps)+'/с';

  document.getElementById('cpVal').textContent=fmt(Cache.click);

  document.getElementById('hFreq').textContent=G.freq;
  document.getElementById('haBox').style.display=G.harm>0?'':'none';
  document.getElementById('hHarm').textContent=G.harm;
  const st=gStage();
  document.getElementById('stageBadge').textContent='Стадия: '+SNAMES[Math.min(st,SNAMES.length-1)];
  if(st!==lastStage){lastStage=st;drawTower(st)}

document.getElementById('clickZone').addEventListener('click',function(e){
  initAudio();
  if(!G.tutorial.done&&!tutorialActive)startTut();
  const now=Date.now();
  // Сброс комбо после 2с паузы
  if(now-G.combo.last>2000)G.combo={count:0,last:0,mult:1};
  if(now-G.combo.last<300)G.combo.count++;else G.combo.count=1;
  G.combo.last=now;
  G.combo.mult=Math.min(1+G.combo.count*0.05,3);
  const pow=Cache.click*G.combo.mult;
  G.sig+=pow;G.tot+=pow;G.totAll+=pow;G.clicks++;
  playClick();triggerHaptic();
  const area=document.getElementById('towerOuter'),rect=area.getBoundingClientRect();
  const x=e.clientX-rect.left,y=e.clientY-rect.top;
  const f=document.createElement('div');f.className='float';
  f.textContent='+'+fmt(pow);
  f.style.cssText=`left:${x}px;top:${y-20}px;color:${pow>1000?'var(--gold)':pow>50?'var(--acc3)':'var(--acc)'}`;
  area.appendChild(f);setTimeout(()=>f.remove(),900);
  const cols=['#00d4ff','#00ffaa','#ffd700','#ff4757','#fff'];
  for(let i=0;i<5;i++){
    const p=document.createElement('div');p.className='burst-p';
    const a=Math.random()*Math.PI*2,d=25+Math.random()*50,sz=3+Math.random()*5;
    p.style.cssText=`left:${x}px;top:${y}px;width:${sz}px;height:${sz}px;background:${cols[i%cols.length]};--tx:${Math.cos(a)*d}px;--ty:${Math.sin(a)*d}px`;
    area.appendChild(p);setTimeout(()=>p.remove(),600);
  }
  document.getElementById('sCount').classList.add('pop');
  setTimeout(()=>document.getElementById('sCount').classList.remove('pop'),100);
  upd();
});

function drawTower(stage){
  const cv=document.getElementById('towerCanvas');if(!cv)return;
  const ctx=cv.getContext('2d');const W=cv.width,H=cv.height;ctx.clearRect(0,0,W,H);
  const isDark=!document.body.classList.contains('light');
  const skin=SKINS.find(s=>s.id===G.currentSkin)||SKINS[0];
  const acc=isDark?skin.colors.acc:'#0077aa';
  const steel=isDark?'#2a4a7a':'#4a7aaa';
  const steelLight=isDark?'#3a6aaa':'#6a9acc';
  const steelDark=isDark?'#1a2f50':'#2a5080';
  const red=isDark?'#ff4757':'#cc2233';
  function glow(x,y,r,rgbBase,alpha=0.6){const g=ctx.createRadialGradient(x,y,0,x,y,r);g.addColorStop(0,`rgba(${rgbBase},${alpha})`);g.addColorStop(1,`rgba(${rgbBase},0)`);ctx.fillStyle=g;ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill()}
  function drawGround(){const g=ctx.createLinearGradient(0,H-20,0,H);g.addColorStop(0,steelDark);g.addColorStop(1,'transparent');ctx.fillStyle=g;ctx.fillRect(20,H-22,W-40,20);ctx.strokeStyle=steelLight;ctx.lineWidth=1;ctx.strokeRect(20,H-22,W-40,20)}
  function drawLeg(x1,y1,x2,y2){const g=ctx.createLinearGradient(x1,y1,x2,y2);g.addColorStop(0,steelLight);g.addColorStop(1,steelDark);ctx.strokeStyle=g;ctx.lineWidth=6;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke()}
  function drawDish(cx,cy,rx,ry,angle){ctx.save();ctx.translate(cx,cy);ctx.rotate(angle);const g=ctx.createLinearGradient(-rx,0,rx,0);g.addColorStop(0,steelDark);g.addColorStop(.5,steelLight);g.addColorStop(1,steelDark);ctx.fillStyle=g;ctx.strokeStyle=acc;ctx.lineWidth=1.5;ctx.beginPath();ctx.ellipse(0,0,rx,ry,0,0,Math.PI*2);ctx.fill();ctx.stroke();ctx.fillStyle=`rgba(${isDark?'0,212,255':'0,100,180'},0.15)`;ctx.beginPath();ctx.ellipse(0,0,rx*.7,ry*.7,0,0,Math.PI*2);ctx.fill();ctx.strokeStyle=steel;ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(0,-ry*1.4);ctx.stroke();ctx.fillStyle=acc;ctx.beginPath();ctx.arc(0,-ry*1.4,4,0,Math.PI*2);ctx.fill();ctx.restore()}
  function drawAntenna(cx,baseY,topY){const g=ctx.createLinearGradient(cx-4,0,cx+4,0);g.addColorStop(0,steelDark);g.addColorStop(.5,steelLight);g.addColorStop(1,steelDark);ctx.fillStyle=g;ctx.fillRect(cx-4,topY,8,baseY-topY);const steps=Math.floor((baseY-topY)/40);for(let i=0;i<=steps;i++){const y=baseY-i*(baseY-topY)/steps;const w=8+i*3;ctx.fillStyle=steelLight;ctx.fillRect(cx-w,y-2,w*2,4);ctx.fillStyle=steelLight;ctx.beginPath();ctx.arc(cx-w+4,y,3,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(cx+w-4,y,3,0,Math.PI*2);ctx.fill()}glow(cx,topY,18,isDark?'255,71,87':'200,30,50',0.6);ctx.fillStyle=red;ctx.beginPath();ctx.arc(cx,topY,5,0,Math.PI*2);ctx.fill()}
  if(stage===0){drawGround();const cx=W/2,base=H-22,top=50;ctx.fillStyle=steelDark;ctx.fillRect(cx-30,base-8,60,8);ctx.strokeStyle=steelLight;ctx.lineWidth=1;ctx.strokeRect(cx-30,base-8,60,8);const mg=ctx.createLinearGradient(cx-5,0,cx+5,0);mg.addColorStop(0,steelDark);mg.addColorStop(.5,steelLight);mg.addColorStop(1,steelDark);ctx.fillStyle=mg;ctx.fillRect(cx-5,top+30,10,base-top-38);glow(cx,top+30,30,isDark?'0,212,255':'0,150,200',0.3);ctx.strokeStyle=acc;ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(cx-40,top+30);ctx.lineTo(cx+40,top+30);ctx.stroke();ctx.beginPath();ctx.moveTo(cx-28,top+20);ctx.lineTo(cx+28,top+20);ctx.stroke();ctx.strokeStyle=steel;ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(cx,top+8);ctx.lineTo(cx,top+30);ctx.stroke();glow(cx,top,16,isDark?'255,71,87':'200,30,50',0.7);ctx.fillStyle=red;ctx.beginPath();ctx.arc(cx,top,4,0,Math.PI*2);ctx.fill()}
  else if(stage===1){drawGround();const cx=W/2,base=H-30,top=35,bot=base-10;drawLeg(cx-70,bot,cx-10,top+60);drawLeg(cx+70,bot,cx+10,top+60);for(let i=0;i<4;i++){const t=i/4,t2=(i+1)/4;const lx=cx-(70*(1-t)+10*t),rx=cx+(70*(1-t)+10*t),y=bot*(1-t)+(top+60)*t;ctx.strokeStyle=steelDark;ctx.lineWidth=2;ctx.setLineDash([4,4]);ctx.beginPath();ctx.moveTo(lx,y);ctx.lineTo(cx-(70*(1-t2)+10*t2),y-(bot-(top+60))/4);ctx.stroke();ctx.beginPath();ctx.moveTo(rx,y);ctx.lineTo(cx+(70*(1-t2)+10*t2),y-(bot-(top+60))/4);ctx.stroke();ctx.setLineDash([]);ctx.strokeStyle=steelLight;ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(lx,y);ctx.lineTo(rx,y);ctx.stroke()}ctx.fillStyle=steelDark;ctx.fillRect(cx-20,top+55,40,8);ctx.strokeStyle=steelLight;ctx.lineWidth=1;ctx.strokeRect(cx-20,top+55,40,8);drawAntenna(cx,top+56,top)}
  else if(stage===2){drawGround();const cx=W/2,base=H-30,top=25,mid=base-60;drawLeg(cx-80,base-10,cx-35,mid);drawLeg(cx+80,base-10,cx+35,mid);drawLeg(cx,base-10,cx,mid);for(let i=0;i<3;i++){const t=i/3;const lx=cx-(80*(1-t)+35*t),rx=cx+(80*(1-t)+35*t),y=base-10+(mid-base+10)*t;ctx.strokeStyle=steelLight;ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(lx,y);ctx.lineTo(rx,y);ctx.stroke()}drawLeg(cx-35,mid,cx-8,top+70);drawLeg(cx+35,mid,cx+8,top+70);for(let i=0;i<2;i++){const t=i/2;const lx=cx-(35*(1-t)+8*t),rx=cx+(35*(1-t)+8*t),y=mid+(top+70-mid)*t;ctx.strokeStyle=steelLight;ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(lx,y);ctx.lineTo(rx,y);ctx.stroke()}ctx.fillStyle=steelDark;ctx.fillRect(cx-22,top+65,44,10);ctx.strokeStyle=acc;ctx.lineWidth=1;ctx.strokeRect(cx-22,top+65,44,10);drawAntenna(cx,top+66,top);drawDish(cx-50,mid+20,20,10,-Math.PI/6);drawDish(cx+50,mid+20,20,10,Math.PI/6);glow(cx-50,mid+20,25,isDark?'0,212,255':'0,150,200',0.2);glow(cx+50,mid+20,25,isDark?'0,212,255':'0,150,200',0.2)}
  else{drawGround();const cx=W/2,base=H-25,twH=base-80;const lw=28;for(let i=0;i<6;i++){const y=base-10-i*twH/6,yn=base-10-(i+1)*twH/6;const scale=1-i*0.05;ctx.strokeStyle=steelLight;ctx.lineWidth=3;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(cx-lw*scale,y);ctx.lineTo(cx-lw*scale,yn);ctx.stroke();ctx.beginPath();ctx.moveTo(cx+lw*scale,y);ctx.lineTo(cx+lw*scale,yn);ctx.stroke();ctx.strokeStyle=steelDark;ctx.lineWidth=2;ctx.setLineDash([3,4]);ctx.beginPath();ctx.moveTo(cx-lw*scale,y);ctx.lineTo(cx+lw*scale,yn);ctx.stroke();ctx.beginPath();ctx.moveTo(cx+lw*scale,y);ctx.lineTo(cx-lw*scale,yn);ctx.stroke();ctx.setLineDash([]);ctx.strokeStyle=steelLight;ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(cx-lw*scale,y);ctx.lineTo(cx+lw*scale,y);ctx.stroke()}const dishY=base-twH-10;glow(cx,dishY,50,isDark?'0,212,255':'0,150,200',0.25);drawDish(cx,dishY,55,14,0);ctx.fillStyle=steelDark;ctx.fillRect(cx-35,dishY+12,70,10);ctx.strokeStyle=steelLight;ctx.lineWidth=1;ctx.strokeRect(cx-35,dishY+12,70,10);drawDish(cx-65,base-50,30,9,-0.3);glow(cx-65,base-50,35,isDark?'0,212,255':'0,150,200',0.15);ctx.strokeStyle=acc;ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(cx,dishY-2);ctx.lineTo(cx,dishY-30);ctx.stroke();glow(cx,dishY-30,14,isDark?'255,71,87':'200,30,50',0.8);ctx.fillStyle=red;ctx.beginPath();ctx.arc(cx,dishY-30,4,0,Math.PI*2);ctx.fill()}
}

// ══════════════════════════════════════════════════════
// SAVE / LOAD — защищённый загрузчик из РАБОТАЮЩИЙ_КОД
// + Telegram CloudStorage из ДИЗАЙН_ТУТ
// ══════════════════════════════════════════════════════
function save(){
  G.last=Date.now();
  const str=JSON.stringify(G);
  try{localStorage.setItem(SAVE_KEY,str)}catch(e){}
  if(TG?.CloudStorage){try{TG.CloudStorage.setItem(SAVE_KEY,str,()=>{})}catch(e){}}
}

function loadSave(){
  return new Promise(resolve=>{
    let done=false;
    const finish=()=>{if(!done){done=true;resolve()}};
    const applyData=raw=>{
      if(!raw){finish();return}
      try{
        const d=JSON.parse(raw);
        const nums=['sig','tot','totAll','clicks','freq','harm','buy','sps'];
        const bools=['autoB','autoU'];
        const strs=['theme','currentSkin'];
        const objs=['bld','upg','ach','res','chDone','chFailed','chStart','combo','daily','boosters','tutorial','settings'];
        for(const k of nums)if(typeof d[k]==='number')G[k]=d[k];
        for(const k of bools)if(typeof d[k]==='boolean')G[k]=d[k];
        for(const k of strs)if(typeof d[k]==='string')G[k]=d[k];
        for(const k of objs)if(d[k]&&typeof d[k]==='object')Object.assign(G[k],d[k]);
        if(typeof d.start==='number')G.start=d.start;
      }catch(e){console.error('Parse error',e)}
      finish();
    };
    // Таймаут-предохранитель 600мс (из РАБОТАЮЩИЙ_КОД)
    const timeout=setTimeout(()=>applyData(localStorage.getItem(SAVE_KEY)),600);
    if(TG?.CloudStorage){
      try{
        TG.CloudStorage.getItem(SAVE_KEY,(err,val)=>{
          clearTimeout(timeout);
          applyData(!err&&val?val:localStorage.getItem(SAVE_KEY));
        });
      }catch(e){clearTimeout(timeout);applyData(localStorage.getItem(SAVE_KEY))}
    }else{clearTimeout(timeout);applyData(localStorage.getItem(SAVE_KEY))}
  });
}

// ══════════════════════════════════════════════════════
// GAME LOOP — из РАБОТАЮЩИЙ_КОД (надёжный)
// ══════════════════════════════════════════════════════
function tick(){
  const dt=(Date.now()-G.last)/1000;G.last=Date.now();
  if(Cache.sps&&isFinite(Cache.sps)&&dt>0){const e=Cache.sps*dt;if(isFinite(e)&&e>0){G.sig+=e;G.tot+=e;G.totAll+=e}}
  const now=Date.now();
  // Проверка испытаний: победа или провал
  for(const ch of CH){
    const cs=G.chStart[ch.id];if(cs===undefined)continue;
    const el=(now-cs.ts)/1000;
    if(el>=ch.dur){
      const earned=G.tot-cs.startSig;
      if(earned>=ch.goal){G.chDone[ch.rw]=true;delete G.chStart[ch.id];notify('🎉 Пройдено!',ch.rwD)}
      else{G.chFailed[ch.id]=(G.chFailed[ch.id]||0)+1;delete G.chStart[ch.id];notify('❌ Провалено: '+ch.nm,'Заработано: '+fmt(earned)+' из '+fmt(ch.goal))}
      recalc();
    }
  }
  // Достижения
  for(const a of ACH)if(!G.ach[a.id]&&a.ck()){G.ach[a.id]=true;notify('🏆 '+a.nm,a.desc)}
  // Случайные события
  if(Math.random()<0.0008)triggerRandomEvent();
  upd();
}

function triggerRandomEvent(){
  if(G.events.length>2||G.tot<1e4)return;
  const ev=EVENTS[Math.floor(Math.random()*EVENTS.length)];
  G.events.push(ev.id);ev.apply();
  const banner=document.createElement('div');banner.className='event-banner';
  banner.innerHTML=`<h3>${ev.nm}</h3><p>${ev.desc}</p><button class="pbtn blu" onclick="this.parentElement.remove();const idx=G.events.indexOf('${ev.id}');if(idx>-1)G.events.splice(idx,1)">Отлично!</button>`;
  document.body.appendChild(banner);setTimeout(()=>{if(banner.parentNode)banner.remove()},5000);
  recalc();
}

function autoTick(){
  if(G.autoB){
    const cm=cMod();let best=null,br=0;
    for(const b of BLD){const cnt=bc(b.id);const cost=bCost(b,cnt)*(cm.costM||1);if(G.sig<cost)continue;const ratio=(b.sps*(Cache.bMult[b.id]||1))/cost;if(ratio>br){br=ratio;best=b}}
    if(best)buyB(best.id);
  }
  if(G.autoU)for(const u of UPG)if(!G.upg[u.id]&&u.req()&&G.sig>=u.cost)buyU(u.id);
}

// ══════════════════════════════════════════════════════
// INIT — async запуск с offline доходом
// ══════════════════════════════════════════════════════
G.last=Date.now();
(async()=>{
  await loadSave();
  if(G.theme==='light')document.body.classList.add('light');
  applySkin();
  recalc();
  renderAll();
  drawTower(gStage());
  lastStage=gStage();
  checkDaily();

  // Offline доход
  const off=(Date.now()-G.last)/1000;
  if(off>15&&Cache.sps>0){
    const gain=Cache.sps*off*0.5;
    G.sig+=gain;G.tot+=gain;G.totAll+=gain;
    setTimeout(()=>{
      const ov=document.createElement('div');ov.className='off-ov';
      ov.innerHTML=`<div class="off-card"><h2>📡 С возвращением!</h2><p>Пока вас не было<br><b>${fmtT(off*1000)}</b></p><div style="font-family:'Space Mono',monospace;font-size:2rem;color:var(--acc);margin:10px 0">${fmt(gain)}</div><p style="font-size:.65rem;color:var(--txt3);margin-bottom:18px">сигналов (50% от дохода)</p><button class="pbtn blu" onclick="this.closest('.off-ov').remove()">Принять</button></div>`;
      document.body.appendChild(ov);
    },400);
  }

  setInterval(tick,50);
  setInterval(renderAll,1000);
  setInterval(autoTick,1000);
  setInterval(save,15000);

  if(!G.tutorial.done&&!tutorialActive)setTimeout(()=>startTut(),600);

  if(TG){
    TG.expand();TG.ready();
    if(TG.colorScheme==='light'){G.theme='light';document.body.classList.add('light')}
    TG.MainButton.setText('💾 Сохранить');
    TG.MainButton.onClick(()=>{save();TG.showAlert('✅ Сохранено!')});
    TG.MainButton.show();
  }

  // Логотип с сайта
  const img=document.getElementById('logoImg');
  const urls=['https://rtrs.ru/favicon.ico','https://rtrs.ru/logo.png'];
  let idx=0;
  const tryNext=()=>{
    if(idx>=urls.length){img.style.display='none';document.getElementById('logoTxt').style.display='block';return}
    img.onerror=()=>{idx++;tryNext()};img.src=urls[idx++];img.style.display='block';
  };
  tryNext();
})();
</script>
</body>
</html>
